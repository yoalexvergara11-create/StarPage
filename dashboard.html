<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Admin Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b10;
            color: white;
            padding: 1.5rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #2e2e3a;
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(90deg, #9333ea, #4ade80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-buttons {
            display: flex;
            gap: 0.8rem;
        }
        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #4ade80;
            color: #4ade80;
        }
        .btn-outline:hover {
            background: #4ade8020;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #2e2e3a;
        }
        .tab {
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            color: #aaa;
            border-bottom: 2px solid transparent;
            font-weight: 500;
        }
        .tab.active {
            color: #c084fc;
            border-bottom-color: #c084fc;
        }
        .section {
            display: none;
            animation: fade 0.2s ease;
        }
        .section.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #111;
            border-radius: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.85rem;
        }
        th {
            background: #1a1a24;
            color: #c084fc;
            font-weight: 600;
        }
        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }
        .pending { background: #f59e0b20; color: #f59e0b; }
        .completed { background: #4ade8020; color: #4ade80; }
        .btn-action {
            background: #9333ea;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .btn-action:hover { background: #7e22ce; }
        .empty-msg {
            text-align: center;
            padding: 2rem;
            color: #888;
        }
        @media (max-width: 700px) {
            th, td { padding: 0.7rem; font-size: 0.75rem; }
            .header { flex-direction: column; align-items: stretch; }
            .nav-buttons { justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">StarPage Admin</div>
        <div class="nav-buttons">
            <a href="vender.html" class="btn btn-outline">Lobby Usuario</a>
            <button class="btn btn-danger" id="btn-logout">Cerrar Sesión</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="kyc">Verificación (KYC)</div>
        <div class="tab" data-tab="pedidos">Pedidos de Cambio</div>
    </div>

    <div id="kyc" class="section active">
        <h3>📋 Usuarios pendientes de verificación</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Email</th><th>Cédula</th><th>WhatsApp</th><th>Estado</th><th>Acción</th></tr>
                </thead>
                <tbody id="kyc-list"></tbody>
            </table>
        </div>
    </div>

    <div id="pedidos" class="section">
        <h3>💱 Solicitudes de cambio</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Usuario</th><th>Envía</th><th>Recibe</th><th>Comprobante</th><th>Estado</th><th>Acción</th></tr>
                </thead>
                <tbody id="pedidos-list"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Control de acceso: solo el admin puede ver esto
        onAuthStateChanged(auth, (user) => {
            if(!user || user.email.toLowerCase() !== "yoalexvergara11@gmail.com") {
                alert("Acceso no autorizado. Redirigiendo...");
                window.location.href = "index.html";
            } else {
                document.body.style.visibility = "visible";
            }
        });

        // Tabs dinámicos
        const tabs = document.querySelectorAll('.tab');
        const sections = {
            kyc: document.getElementById('kyc'),
            pedidos: document.getElementById('pedidos')
        };
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.values(sections).forEach(s => s.classList.remove('active'));
                sections[target].classList.add('active');
            });
        });

        // Función global para aprobar usuario
        window.aprobarUsuario = async (userId) => {
            try {
                await updateDoc(doc(db, "users", userId), { status: 'approved' });
            } catch(e) {
                alert("Error: " + e.message);
            }
        };

        window.completarPedido = async (pedidoId) => {
            try {
                await updateDoc(doc(db, "pedidos", pedidoId), { status: 'completed' });
            } catch(e) {
                alert("Error: " + e.message);
            }
        };

        // Cargar usuarios pendientes (KYC)
        onSnapshot(collection(db, "users"), (snapshot) => {
            const tbody = document.getElementById('kyc-list');
            tbody.innerHTML = '';
            let pendientes = 0;
            snapshot.forEach(docSnap => {
                const user = docSnap.data();
                if(user.status === 'pending') {
                    pendientes++;
                    tbody.innerHTML += `
                        <tr>
                            <td>${user.email || '—'}</td>
                            <td>${user.dni || '—'}</td>
                            <td>${user.phone || '—'}</td>
                            <td><span class="status-badge pending">${user.status}</span></td>
                            <td><button class="btn-action" onclick="aprobarUsuario('${docSnap.id}')">Aprobar</button></td>
                        </tr>
                    `;
                }
            });
            if(pendientes === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">✅ No hay usuarios pendientes</td></tr>';
            }
        });

        // Cargar pedidos
        onSnapshot(collection(db, "pedidos"), (snapshot) => {
            const tbody = document.getElementById('pedidos-list');
            tbody.innerHTML = '';
            let count = 0;
            snapshot.forEach(docSnap => {
                const p = docSnap.data();
                count++;
                tbody.innerHTML += `
                    <tr>
                        <td>${p.userEmail || '—'}</td>
                        <td>${p.montoIn || '0'} ${p.monedaIn || ''}</td>
                        <td>${p.montoOut || '0'} ${p.monedaOut || ''}</td>
                        <td><a href="${p.comprobanteURL}" target="_blank" style="color:#4ade80;">Ver</a></td>
                        <td><span class="status-badge ${p.status}">${p.status}</span></td>
                        <td>
                            ${p.status === 'pending' ? `<button class="btn-action" onclick="completarPedido('${docSnap.id}')">Completar</button>` : '✔️ Finalizado'}
                        </td>
                    </tr>
                `;
            });
            if(count === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">📭 No hay pedidos aún</td></tr>';
            }
        });

        // Cerrar sesión
        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
