<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control | StarPage Admin</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="padding: 30px;">
    <!-- Barra Superior -->
    <div class="glass-panel" style="display:flex; justify-content: space-between; align-items: center; padding: 20px 40px; margin-bottom: 30px;">
        <h2 style="margin:0;">SISTEMA <span style="color:var(--primary)">ADMIN</span></h2>
        <div>
            <button class="btn-premium" onclick="window.location.href='vender.html'" style="background:var(--secondary); margin-right: 10px;">Vista Usuario</button>
            <button class="btn-premium" onclick="logout()" style="background:#ff4b2b;">Salir</button>
        </div>
    </div>

    <!-- Stats Principales -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="glass-panel stat-card">
            <p>Tasa Cliente USD/VES</p>
            <div id="display-rate" class="stat-value">---</div>
            <button onclick="updateRate()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:bold;">Ajustar Tasa</button>
        </div>
        <div class="glass-panel stat-card" style="border-left-color: var(--gold);">
            <p>Ganancias del Mes (Netas)</p>
            <div id="profit-value" class="stat-value">$0.00</div>
        </div>
        <div class="glass-panel stat-card" style="border-left-color: #00ff88;">
            <p>Pedidos Pendientes</p>
            <div id="pending-count" class="stat-value">0</div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
        <!-- Tabla de Pedidos -->
        <div class="glass-panel" style="padding: 30px;">
            <h3>📥 Órdenes en Tiempo Real</h3>
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead style="border-bottom: 1px solid var(--border);">
                    <tr>
                        <th style="padding: 15px;">Email</th>
                        <th>Monto</th>
                        <th>Recibe</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="orders-list"></tbody>
            </table>
        </div>

        <!-- Gestión de Roles -->
        <div class="glass-panel" style="padding: 30px;">
            <h3>🔑 Control de Acceso</h3>
            <p style="font-size: 0.85rem; opacity: 0.7;">Asigna trabajadores o administradores por correo electrónico.</p>
            <input type="email" id="role-email" class="modern-input" placeholder="Email del usuario" style="margin-bottom: 15px;">
            <select id="role-type" class="modern-input" style="margin-bottom: 15px;">
                <option value="worker">Trabajador</option>
                <option value="admin">Administrador</option>
                <option value="client">Cliente</option>
            </select>
            <button class="btn-premium" onclick="assignRole()" style="width: 100%;">Actualizar Permisos</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* TUS DATOS */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Ajustar Tasa Manualmente
        window.updateRate = async () => {
            const { value: newRate } = await Swal.fire({
                title: 'Ajustar Tasa de Cambio',
                input: 'number',
                inputLabel: 'Tasa para el cliente (VES)',
                showCancelButton: true
            });
            if (newRate) {
                await setDoc(doc(db, "settings", "rates"), { sellRate: parseFloat(newRate) });
                Swal.fire('Éxito', 'Tasa actualizada.', 'success');
            }
        };

        // Escucha de Pedidos en Vivo
        onSnapshot(collection(db, "orders"), (snap) => {
            const list = document.getElementById('orders-list');
            let pending = 0;
            let profit = 0;
            list.innerHTML = "";
            
            snap.forEach(docSnap => {
                const o = docSnap.data();
                if(o.status === "pending") pending++;
                if(o.status === "completed") profit += o.commissionUSD;

                list.innerHTML += `
                    <tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 15px;">${o.userEmail}</td>
                        <td>$${o.amountUSD}</td>
                        <td>${o.amountVES} Bs</td>
                        <td><span style="color:${o.status==='pending'?'#ffcc00':'#00ff88'}">${o.status}</span></td>
                        <td>
                            <button onclick="processOrder('${docSnap.id}')" class="btn-premium" style="padding:5px 10px; font-size:10px;">Detalles</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('pending-count').innerText = pending;
            document.getElementById('profit-value').innerText = `$${profit.toFixed(2)}`;
        });

        // Escucha de Tasa
        onSnapshot(doc(db, "settings", "rates"), (doc) => {
            if(doc.exists()) document.getElementById('display-rate').innerText = `${doc.data().sellRate} Bs`;
        });

        // Asignar Rol
        window.assignRole = async () => {
            const email = document.getElementById('role-email').value;
            const role = document.getElementById('role-type').value;
            const q = query(collection(db, "users"), where("email", "==", email));
            const snap = await getDocs(q);
            if(!snap.empty) {
                await updateDoc(doc(db, "users", snap.docs[0].id), { role });
                Swal.fire('Listo', `Usuario actualizado a ${role}`, 'success');
            } else {
                Swal.fire('Error', 'Usuario no encontrado.', 'error');
            }
        };

        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
