<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Panel de Control CEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0b0b10; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2e2e3a; padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; background: linear-gradient(90deg, #9333ea, #4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a24; padding: 20px; border-radius: 15px; border: 1px solid #2e2e3a; }
        .stat-card h3 { margin: 0; color: #888; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #4ade80; }

        table { width: 100%; border-collapse: collapse; background: #1a1a24; border-radius: 15px; overflow: hidden; }
        th { background: #232330; padding: 15px; text-align: left; color: #c084fc; }
        td { padding: 15px; border-bottom: 1px solid #2e2e3a; font-size: 14px; }
        
        .kyc-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid #9333ea; }
        .kyc-img:hover { transform: scale(3); transition: 0.3s; z-index: 10; position: relative; }
        
        .status-pill { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        
        .btn-action { background: #9333ea; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">StarPage Admin</div>
        <button class="btn-action" onclick="window.location.href='index.html'">Cerrar Sesión</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Usuarios Registrados</h3>
            <p id="total-users">0</p>
        </div>
        <div class="stat-card">
            <h3>Pendientes de KYC</h3>
            <p id="pending-kyc" style="color: #ffc107;">0</p>
        </div>
    </div>

    <h2>Verificación de Identidad (KYC)</h2>
    <table>
        <thead>
            <tr>
                <th>Usuario / Email</th>
                <th>Cédula/ID</th>
                <th>WhatsApp</th>
                <th>Documento</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="users-table">
            </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Escuchar cambios en tiempo real en la colección "users"
        onSnapshot(collection(db, "users"), (snapshot) => {
            const tableBody = document.getElementById('users-table');
            tableBody.innerHTML = '';
            let total = 0;
            let pending = 0;

            snapshot.forEach((docSnap) => {
                const user = docSnap.data();
                total++;
                if(user.status === 'pending') pending++;

                const row = `
                    <tr>
                        <td>${user.email}</td>
                        <td>${user.dni || 'N/A'}</td>
                        <td>${user.phone || 'N/A'}</td>
                        <td>
                            <img src="${user.photoURL}" class="kyc-img" alt="KYC" onerror="this.src='https://via.placeholder.com/50'">
                        </td>
                        <td><span class="status-pill pending">${user.status}</span></td>
                        <td>
                            <button class="btn-action" onclick="aprobarUsuario('${docSnap.id}')">Aprobar</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            document.getElementById('total-users').innerText = total;
            document.getElementById('pending-kyc').innerText = pending;
        });

        window.aprobarUsuario = async (userId) => {
            const userRef = doc(db, "users", userId);
            await updateDoc(userRef, { status: 'approved' });
            alert("Usuario aprobado con éxito.");
        };
    </script>
</body>
</html>
