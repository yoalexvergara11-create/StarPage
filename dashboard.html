<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Admin Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0b0b10; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2e2e3a; padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; background: linear-gradient(90deg, #9333ea, #4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Botones de Navegación */
        .nav-buttons { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; text-decoration: none; }
        .btn-view { background: #232330; color: #4ade80; border: 1px solid #4ade80; }
        .btn-logout { background: #dc2626; color: white; }

        /* Pestañas */
        .tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #2e2e3a; }
        .tab { padding: 10px 20px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
        .tab.active { color: #9333ea; border-bottom: 2px solid #9333ea; font-weight: bold; }

        .section { display: none; }
        .section.active { display: block; }

        table { width: 100%; border-collapse: collapse; background: #1a1a24; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th { background: #232330; padding: 15px; text-align: left; color: #c084fc; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #2e2e3a; font-size: 13px; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; text-transform: uppercase; }
        .pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .completed { background: rgba(74, 222, 128, 0.2); color: #4ade80; }

        .btn-action { background: #9333ea; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">StarPage Admin</div>
        <div class="nav-buttons">
            <a href="index.html" class="btn btn-view">Ver Página de Inicio</a>
            <button class="btn btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('kyc-section', this)">Verificación (KYC)</div>
        <div class="tab" onclick="switchTab('pedidos-section', this)">Pedidos de Cambio</div>
    </div>

    <div id="kyc-section" class="section active">
        <h2>Usuarios Pendientes</h2>
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Cédula</th>
                    <th>WhatsApp</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="kyc-table">
                </tbody>
        </table>
    </div>

    <div id="pedidos-section" class="section">
        <h2>Pedidos Recientes</h2>
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Monto Enviado</th>
                    <th>Recibe</th>
                    <th>Captura de Pago</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="pedidos-table">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Lógica de Pestañas ---
        window.switchTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // --- Cargar KYC ---
        onSnapshot(collection(db, "users"), (snapshot) => {
            const table = document.getElementById('kyc-table');
            table.innerHTML = '';
            snapshot.forEach(docSnap => {
                const user = docSnap.data();
                if(user.status === 'pending') {
                    table.innerHTML += `
                        <tr>
                            <td>${user.email}</td>
                            <td>${user.dni}</td>
                            <td>${user.phone}</td>
                            <td><span class="status-badge pending">${user.status}</span></td>
                            <td><button class="btn-action" onclick="aprobarUsuario('${docSnap.id}')">Aprobar</button></td>
                        </tr>
                    `;
                }
            });
        });

        // --- Cargar Pedidos (Notificaciones en tiempo real) ---
        onSnapshot(collection(db, "pedidos"), (snapshot) => {
            const table = document.getElementById('pedidos-table');
            table.innerHTML = '';
            snapshot.forEach(docSnap => {
                const p = docSnap.data();
                table.innerHTML += `
                    <tr>
                        <td>${p.userEmail}</td>
                        <td>${p.montoIn} ${p.monedaIn}</td>
                        <td>${p.montoOut} ${p.monedaOut}</td>
                        <td><a href="${p.comprobanteURL}" target="_blank" style="color:#4ade80">Ver Recibo</a></td>
                        <td><span class="status-badge ${p.status}">${p.status}</span></td>
                        <td>
                            ${p.status === 'pending' ? `<button class="btn-action" onclick="completarPedido('${docSnap.id}')">Completar</button>` : 'OK'}
                        </td>
                    </tr>
                `;
            });
        });

        window.aprobarUsuario = (id) => updateDoc(doc(db, "users", id), { status: 'approved' });
        window.completarPedido = (id) => updateDoc(doc(db, "pedidos", id), { status: 'completed' });
    </script>
</body>
</html>
