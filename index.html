<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | StarPage</title>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <!-- (Asegúrate de que la ruta a tu CSS es correcta) -->
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* Estilo para el botón deshabilitado */
        .btn-grad:disabled {
            background-image: linear-gradient(to right, #999, #777);
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Formulario de Acceso -->
        <form id="log-form" onsubmit="event.preventDefault(); handleAuth('login')">
            <h2>Acceso Clientes</h2>
            <div class="input-group">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="email" id="l-email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="l-pass" placeholder="Tu contraseña" required>
                <i class="fa-solid fa-eye eye-btn" onclick="togglePass('l-pass')"></i>
            </div>
            <button type="submit" class="btn-grad">Entrar</button>
            <p class="switch-link">¿No tienes cuenta? <span onclick="toggleView()">Regístrate</span></p>
        </form>

        <!-- Formulario de Registro -->
        <form id="reg-form" class="hidden" onsubmit="event.preventDefault(); handleAuth('signup')">
            <h2>Únete a StarPage</h2>
            <div class="input-group">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="email" id="r-email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="r-pass" placeholder="Crea una contraseña" required>
                <i class="fa-solid fa-eye eye-btn" onclick="togglePass('r-pass')"></i>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-id-card icon"></i>
                <input type="text" id="r-dni" placeholder="Cédula o DNI" required>
            </div>
            <div class="input-group phone-group">
                <select id="r-prefix">
                    <option value="+58">+58 (VEN)</option>
                    <option value="+1">+1 (USA)</option>
                    <option value="+57">+57 (COL)</option>
                </select>
                <input type="tel" id="r-phone" placeholder="Número de teléfono" required>
            </div>
            <div class="input-group file-group">
                <label for="r-file">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Sube tu documento de identidad
                </label>
                <input type="file" id="r-file" accept="image/png, image/jpeg" required>
                <span id="file-name"></span>
            </div>
            <button type="submit" class="btn-grad" id="btn-reg">Crear mi Cuenta</button>
            <p class="switch-link">¿Ya tienes cuenta? <span onclick="toggleView()">Inicia sesión</span></p>
        </form>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        // --- Lógica para manejar autenticación ---
        window.handleAuth = async (mode) => {
            if (mode === 'login') {
                const email = document.getElementById('l-email').value;
                const pass = document.getElementById('l-pass').value;
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                    // Dejamos que el onAuthStateChanged maneje la redirección
                } catch (error) {
                    alert("Error al iniciar sesión: " + error.message);
                }
            } else if (mode === 'signup') {
                const email = document.getElementById('r-email').value.trim();
                const pass = document.getElementById('r-pass').value;
                const dni = document.getElementById('r-dni').value.trim();
                const phone = document.getElementById('r-prefix').value + document.getElementById('r-phone').value.trim();
                const file = document.getElementById('r-file').files[0];

                if (!email || !pass || !dni || !file) {
                    return alert("Por favor, completa todos los campos y sube tu DNI.");
                }
                if (pass.length < 6) {
                    return alert("La contraseña debe tener al menos 6 caracteres.");
                }

                const btn = document.getElementById('btn-reg');
                btn.disabled = true;
                btn.innerText = "Procesando...";

                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    const user = userCredential.user;

                    const fileExtension = file.name.split('.').pop();
                    const storageRef = ref(storage, `kyc/${user.uid}.${fileExtension}`);
                    await uploadBytes(storageRef, file);
                    const photoURL = await getDownloadURL(storageRef);

                    await setDoc(doc(db, "users", user.uid), {
                        email: email.toLowerCase(),
                        phone: phone,
                        dni: dni,
                        photoURL: photoURL,
                        role: "client",
                        status: "pending",
                        createdAt: new Date()
                    });
                    // La redirección la manejará onAuthStateChanged
                } catch (e) {
                    alert("Error en el registro: " + e.message);
                    btn.disabled = false;
                    btn.innerText = "Crear mi Cuenta";
                }
            }
        };

        // --- Lógica de UI ---
        const logForm = document.getElementById('log-form');
        const regForm = document.getElementById('reg-form');
        window.toggleView = () => {
            logForm.classList.toggle('hidden');
            regForm.classList.toggle('hidden');
        };
        window.togglePass = (id) => {
            const passField = document.getElementById(id);
            const eyeBtn = passField.nextElementSibling;
            if (passField.type === 'password') {
                passField.type = 'text';
                eyeBtn.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passField.type = 'password';
                eyeBtn.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };
        document.getElementById('r-file').addEventListener('change', function() {
            document.getElementById('file-name').textContent = this.files[0] ? this.files[0].name : '';
        });

        // --- Manejador de estado de autenticación ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    if (userData.role === "admin") {
                        window.location.href = "dashboard.html";
                    } else if (userData.status === "approved") {
                        window.location.href = "vender.html"; // O la página principal para clientes
                    } else {
                        window.location.href = "lobby.html"; // Para clientes pendientes
                    }
                } else {
                    // Este es el caso de un usuario en Auth sin datos en Firestore, un error
                    alert("Error crítico: No se encontraron los datos del usuario. Contacte a soporte.");
                    auth.signOut();
                }
            }
        });

    </script>
</body>
</html>
