<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>StarPage VE · Plataforma de Intercambio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ========== TUS ESTILOS ORIGINALES (no los cambio) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: radial-gradient(circle at 10% 20%, #03050b, #000000); color: #eef5ff; line-height: 1.5; }
    .glass-card { background: rgba(8, 18, 28, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(0, 240, 255, 0.25); border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 12px rgba(0,240,255,0.2); transition: all 0.2s ease; padding: 1.5rem; }
    .neon-text { color: #00f0ff; text-shadow: 0 0 5px #00f0ff, 0 0 12px #ff6bd6; }
    .btn-neon { background: linear-gradient(95deg, #00c3ff, #ff6bd6); border: none; color: #010101; font-weight: bold; padding: 10px 24px; border-radius: 60px; cursor: pointer; transition: 0.2s; }
    .btn-neon:hover { transform: scale(1.02); box-shadow: 0 0 18px #ff6bd6; }
    .btn-outline { background: transparent; border: 1px solid #00f0ff; color: #00f0ff; border-radius: 40px; padding: 8px 18px; cursor: pointer; }
    input, select, textarea { background: #0b1018; border: 1px solid #2a3a48; padding: 12px 14px; border-radius: 20px; color: white; width: 100%; margin-top: 6px; margin-bottom: 12px; }
    input:focus, select:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 6px cyan; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 18px 5%; border-bottom: 1px solid rgba(0,240,255,0.3); flex-wrap: wrap; }
    .logo { font-size: 1.7rem; font-weight: 800; }
    .badge-ve { background: #ff6bd6; color: black; font-size: 0.7rem; border-radius: 30px; padding: 2px 10px; margin-left: 8px; vertical-align: middle; }
    .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .main-container { max-width: 1400px; margin: 20px auto; padding: 0 20px 40px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .order-item { background: #0f1722; border-left: 5px solid #00f0ff; border-radius: 20px; padding: 16px; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 30px; left: 20px; background: #1e2a3a; border-left: 6px solid #00f0ff; padding: 12px 20px; border-radius: 16px; z-index: 2000; }
    .chat-widget { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
    .chat-button { background: #ff6bd6; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; box-shadow: 0 0 20px #ff6bd6; }
    .chat-panel { position: fixed; bottom: 90px; right: 24px; width: 320px; height: 450px; background: #0a0f1c; border-radius: 24px; border: 1px solid cyan; display: none; flex-direction: column; overflow: hidden; z-index: 1200; }
    .chat-header { padding: 12px; background: #0f1722; border-bottom: 1px solid cyan; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
    .chat-input-area { display: flex; border-top: 1px solid #2a3a48; }
    .chat-input-area input { flex: 1; border: none; border-radius: 0; margin: 0; }
    .chat-input-area button { background: #00f0ff; border: none; padding: 12px; cursor: pointer; }
    footer { text-align: center; padding: 28px 20px; border-top: 1px solid rgba(0,240,255,0.15); margin-top: 40px; font-size: 13px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
    .status-pending { color: #f0b400; }
    .status-processing { color: #00aaff; }
    .status-completed { color: #00cc88; }
    .status-cancelled { color: #ff4466; }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-rocket" style="color:#00f0ff"></i> StarPage<span class="badge-ve">VE</span></div>
  <div class="nav-buttons" id="navButtons">
    <button class="btn-outline" data-view="landing">Inicio</button>
    <button class="btn-outline" data-view="register">Registro</button>
    <button class="btn-outline" data-view="login">Acceso</button>
    <button class="btn-outline" data-view="dashboard" style="display:none;" id="dashboardNavBtn">Dashboard</button>
    <button class="btn-outline" data-view="admin" style="display:none;" id="adminNavBtn">Admin</button>
    <button class="btn-outline" id="logoutBtn" style="display:none;">Salir</button>
  </div>
</header>

<main class="main-container" id="appRoot"></main>

<footer>© StarPage - Todos los derechos reservados a nombre de la empresa StarPage · <span id="rateFooter">Tasa: 600.000 Bs/USD</span></footer>

<!-- Chat widget -->
<div class="chat-widget">
  <div class="chat-button" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></div>
  <div class="chat-panel glass-card" id="chatPanel">
    <div class="chat-header">💬 Soporte en vivo</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Escribe tu mensaje...">
      <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURACIÓN DE SUPABASE (TUS CLAVES) ==========
  const SUPABASE_URL = "https://drdlldpcyeaavjdqrzec.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyZGxsZHBjeWVhYXZqZHFyemVjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTI1Nzk3NiwiZXhwIjoyMDkwODMzOTc2fQ.xs_UB5AMXLLLJ7A2hKre06MrENMkgNhy3unAWBiWjhE";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ========== TU CÓDIGO ORIGINAL (con localStorage) - solo cambié registro y login ==========
  let users = JSON.parse(localStorage.getItem('starpage_users')) || [];
  let orders = JSON.parse(localStorage.getItem('starpage_orders')) || [];
  let settings = JSON.parse(localStorage.getItem('starpage_settings')) || { rate: 600000, commission: 6 };
  let chatMessages = JSON.parse(localStorage.getItem('starpage_chat')) || [];
  let currentUser = JSON.parse(sessionStorage.getItem('starpage_current_user')) || null;

  // Datos iniciales de prueba (para que no esté vacío)
  if (users.length === 0) {
    users.push({ id: '1', full_name: 'Admin', cedula: '00000000', email: 'admin@starpage.com', password: 'admin123', phone: '04120000000', address: 'Oficina', kyc_status: 'verified', bank_name: 'Banesco', bank_account: '0134-0000-0000', phone_pagomovil: '04120000000', role: 'admin' });
    users.push({ id: '2', full_name: 'Usuario Prueba', cedula: '12345678', email: 'usuario@test.com', password: '123456', phone: '04121234567', address: 'Calle Falsa', kyc_status: 'pending', bank_name: 'Banco de Venezuela', bank_account: '0102-1234-5678', phone_pagomovil: '04121234567', role: 'user' });
    users.push({ id: '3', full_name: 'Fundador', cedula: '87654321', email: 'fundador@starpage.com', password: 'fundador123', phone: '04140000001', address: 'Sede', kyc_status: 'verified', bank_name: 'Mercantil', bank_account: '0105-0001-0001', phone_pagomovil: '04140000001', role: 'founder' });
    localStorage.setItem('starpage_users', JSON.stringify(users));
  }
  if (orders.length === 0) {
    orders.push({ id: 'ORD-001', userId: '2', source_currency: 'PayPal', amount_usd: 100, exchange_rate: 600000, commission_percent: 6, net_bs: 56400000, destination_account: '04121234567', payment_proof_url: '', status: 'completed', created_at: new Date().toISOString() });
    localStorage.setItem('starpage_orders', JSON.stringify(orders));
  }
  localStorage.setItem('starpage_settings', JSON.stringify(settings));

  function saveUsers() { localStorage.setItem('starpage_users', JSON.stringify(users)); }
  function saveOrders() { localStorage.setItem('starpage_orders', JSON.stringify(orders)); }
  function saveSettings() { localStorage.setItem('starpage_settings', JSON.stringify(settings)); }
  function saveChat() { localStorage.setItem('starpage_chat', JSON.stringify(chatMessages)); }
  function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
  function updateFooterRate() { document.getElementById('rateFooter').innerText = `Tasa: ${settings.rate.toLocaleString()} Bs/USD · Comisión: ${settings.commission}%`; }

  // ========== REGISTRO MEJORADO (guarda en localStorage Y en Supabase) ==========
  async function handleRegister(e) {
    e.preventDefault();
    const email = document.getElementById('reg_email').value;
    const password = document.getElementById('reg_password').value;
    const full_name = document.getElementById('reg_name').value;
    const cedula = document.getElementById('reg_cedula').value;

    // Verificar si ya existe en localStorage
    if (users.find(u => u.email === email)) { showToast('Email ya registrado'); return; }

    // Crear usuario en localStorage (siempre funciona)
    const newUser = {
      id: Date.now().toString(),
      full_name, cedula, email, password,
      phone: document.getElementById('reg_phone').value,
      address: document.getElementById('reg_address').value,
      bank_name: document.getElementById('reg_bank').value,
      bank_account: document.getElementById('reg_account').value,
      phone_pagomovil: document.getElementById('reg_pagomovil').value,
      kyc_status: 'pending',
      role: 'user'
    };
    users.push(newUser);
    saveUsers();
    showToast('Registro exitoso. Inicia sesión.');

    // Intentar guardar también en Supabase (opcional, no bloquea)
    try {
      const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
      if (!authError) {
        await supabase.from('users').insert([{ id: authData.user.id, full_name, cedula, phone: newUser.phone, address: newUser.address, bank_name: newUser.bank_name, bank_account: newUser.bank_account, phone_pagomovil: newUser.phone_pagomovil, role: 'user' }]);
      }
    } catch (err) { console.log('Supabase no disponible, pero el registro local funciona'); }

    renderView('login');
  }

  // ========== LOGIN MEJORADO (primero localStorage, luego Supabase como respaldo) ==========
  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login_email').value;
    const pwd = document.getElementById('login_password').value;

    // Buscar en localStorage primero (rápido y seguro)
    let user = users.find(u => u.email === email && u.password === pwd);
    if (user) {
      currentUser = { id: user.id, full_name: user.full_name, email: user.email, role: user.role, kyc_status: user.kyc_status };
      sessionStorage.setItem('starpage_current_user', JSON.stringify(currentUser));
      updateNavButtons();
      renderView('dashboard');
      showToast(`✨ Bienvenido a StarPage, ${user.full_name} ✨`);
      return;
    }

    // Si no está en localStorage, intentar con Supabase
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      const { data: userData } = await supabase.from('users').select('*').eq('id', data.user.id).single();
      if (userData) {
        // Guardar también en localStorage para futuros inicios rápidos
        const newLocalUser = { id: userData.id, full_name: userData.full_name, email, password: pwd, cedula: userData.cedula, role: userData.role, kyc_status: userData.kyc_status };
        users.push(newLocalUser);
        saveUsers();
        currentUser = { id: userData.id, full_name: userData.full_name, email, role: userData.role, kyc_status: userData.kyc_status };
        sessionStorage.setItem('starpage_current_user', JSON.stringify(currentUser));
        updateNavButtons();
        renderView('dashboard');
        showToast(`✨ Bienvenido a StarPage, ${userData.full_name} ✨`);
      }
    } catch (err) {
      showToast('Credenciales inválidas');
    }
  }

  // ========== EL RESTO DE TU CÓDIGO ORIGINAL (sin cambios) ==========
  const views = {
    landing: () => `<div class="glass-card" style="text-align:center"><h1 class="neon-text">⚡ StarPage VE</h1><p>Intercambio de monedas digitales (PayPal, Zinli, USDT) a Bolívares vía Pago Móvil o Transferencia.</p><p>Seguro, rápido y con soporte 24/7.</p><button class="btn-neon" data-view="register">Crear cuenta ahora</button></div>`,
    register: () => `<div class="glass-card" style="max-width:600px;margin:auto"><h2>Registro completo</h2><form id="registerForm"><input type="text" id="reg_name" placeholder="Nombre completo" required><input type="text" id="reg_cedula" placeholder="Cédula" required><input type="email" id="reg_email" placeholder="Email" required><input type="tel" id="reg_phone" placeholder="Teléfono"><input type="text" id="reg_address" placeholder="Dirección"><input type="password" id="reg_password" placeholder="Contraseña" required><input type="text" id="reg_bank" placeholder="Banco"><input type="text" id="reg_account" placeholder="Número de cuenta"><input type="text" id="reg_pagomovil" placeholder="Teléfono Pago Móvil"><button type="submit" class="btn-neon">Registrarme</button></form><p>¿Ya tienes cuenta? <a href="#" data-view="login">Inicia sesión</a></p></div>`,
    login: () => `<div class="glass-card" style="max-width:450px;margin:auto"><h2>Acceso</h2><form id="loginForm"><input type="email" id="login_email" placeholder="Email" required><input type="password" id="login_password" placeholder="Contraseña" required><button type="submit" class="btn-neon">Entrar</button></form><p>¿Sin cuenta? <a href="#" data-view="register">Regístrate</a></p></div>`,
    dashboard: () => {
      if (!currentUser) return '<p>Debes iniciar sesión.</p>';
      const userOrders = orders.filter(o => o.userId === currentUser.id);
      return `<div class="dashboard-grid"><div class="glass-card"><h2>💰 Calculadora de cambio</h2><label>Monto en USD: <input type="number" id="calcUsd" value="100"></label><p>Tasa actual: ${settings.rate.toLocaleString()} Bs/USD</p><p>Comisión: ${settings.commission}%</p><p><strong>Recibirás: <span id="calcResult">0</span> Bs</strong></p><hr><h3>Crear nueva orden</h3><form id="createOrderForm"><select id="orderSource"><option>PayPal</option><option>Zinli</option><option>USDT</option></select><input type="number" id="orderAmount" placeholder="Monto USD" required><input type="text" id="orderDestination" placeholder="Cuenta destino (Pago Móvil o Transferencia)" required><button type="submit" class="btn-neon">Generar orden</button></form><div id="orderResult"></div></div><div class="glass-card"><h3>📋 Mis órdenes</h3><div id="myOrdersList">${userOrders.map(o => `<div class="order-item"><strong>ID:</strong> ${o.id}<br><strong>Monto:</strong> $${o.amount_usd}<br><strong>Neto Bs:</strong> ${o.net_bs.toLocaleString()}<br><strong>Estado:</strong> <span class="status-${o.status}">${o.status}</span><br>${o.payment_proof_url ? `<a href="${o.payment_proof_url}" target="_blank">Ver comprobante</a>` : '<button class="btn-outline" data-orderid="'+o.id+'" onclick="uploadProofPrompt(\''+o.id+'\')">Subir comprobante</button>'}</div>`).join('') || '<p>No hay órdenes</p>'}</div></div></div>`;
    },
    admin: () => {
      if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'founder')) return '<p>Acceso denegado.</p>';
      return `<div class="glass-card"><h2>Panel de Administración</h2><div style="display:flex;gap:20px;flex-wrap:wrap;"><button id="adminShowOrdersBtn" class="btn-outline">Órdenes</button><button id="adminShowUsersBtn" class="btn-outline">Usuarios</button><button id="adminShowSettingsBtn" class="btn-outline">Ajustes (Tasa/Comisión)</button>${currentUser.role === 'founder' ? '<button id="adminManageAdminsBtn" class="btn-outline">Gestionar Admins</button>' : ''}</div><div id="adminContent"></div></div>`;
    }
  };

  function renderView(viewName) {
    const container = document.getElementById('appRoot');
    if (views[viewName]) container.innerHTML = views[viewName]();
    else container.innerHTML = views.landing();
    if (viewName === 'register') document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
    if (viewName === 'login') document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
    if (viewName === 'dashboard') {
      document.getElementById('calcUsd')?.addEventListener('input', updateCalculator);
      updateCalculator();
      document.getElementById('createOrderForm')?.addEventListener('submit', createOrder);
    }
    if (viewName === 'admin') {
      document.getElementById('adminShowOrdersBtn')?.addEventListener('click', () => showAdminOrders());
      document.getElementById('adminShowUsersBtn')?.addEventListener('click', () => showAdminUsers());
      document.getElementById('adminShowSettingsBtn')?.addEventListener('click', () => showAdminSettings());
      if (currentUser?.role === 'founder') document.getElementById('adminManageAdminsBtn')?.addEventListener('click', () => showAdminManageAdmins());
      showAdminOrders();
    }
  }

  function updateCalculator() {
    const usd = parseFloat(document.getElementById('calcUsd')?.value) || 0;
    const gross = usd * settings.rate;
    const net = gross * (1 - settings.commission / 100);
    document.getElementById('calcResult').innerText = net.toLocaleString();
  }

  function createOrder(e) {
    e.preventDefault();
    const source = document.getElementById('orderSource').value;
    const amount = parseFloat(document.getElementById('orderAmount').value);
    const destination = document.getElementById('orderDestination').value;
    if (!amount || amount <= 0) { showToast('Monto inválido'); return; }
    const gross = amount * settings.rate;
    const net = gross * (1 - settings.commission / 100);
    const newOrder = {
      id: 'ORD-' + Math.floor(Math.random() * 10000),
      userId: currentUser.id,
      source_currency: source,
      amount_usd: amount,
      exchange_rate: settings.rate,
      commission_percent: settings.commission,
      net_bs: net,
      destination_account: destination,
      payment_proof_url: '',
      status: 'pending',
      created_at: new Date().toISOString()
    };
    orders.push(newOrder);
    saveOrders();
    showToast('Orden creada. Sube el comprobante de pago.');
    renderView('dashboard');
  }

  window.uploadProofPrompt = (orderId) => {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*,application/pdf';
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const fakeUrl = ev.target.result;
          const order = orders.find(o => o.id === orderId);
          if (order) { order.payment_proof_url = fakeUrl; saveOrders(); showToast('Comprobante subido'); renderView('dashboard'); }
        };
        reader.readAsDataURL(file);
      }
    };
    fileInput.click();
  };

  function showAdminOrders() {
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Todas las órdenes</h3><div id="ordersAdminList"></div>`;
    const renderOrders = () => {
      const list = orders.map(o => {
        const user = users.find(u => u.id === o.userId);
        return `<div class="order-item"><b>Orden ${o.id}</b> - Usuario: ${user?.full_name || '?'}<br>Monto: $${o.amount_usd} → ${o.net_bs.toLocaleString()} Bs<br>Estado: <span class="status-${o.status}">${o.status}</span><br><select id="statusSelect-${o.id}"><option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='processing'?'selected':''}>processing</option><option ${o.status==='completed'?'selected':''}>completed</option><option ${o.status==='cancelled'?'selected':''}>cancelled</option></select><button onclick="updateOrderStatus('${o.id}')">Actualizar</button> ${o.payment_proof_url ? '<a href="'+o.payment_proof_url+'" target="_blank">Ver comprobante</a>' : 'Sin comprobante'}</div>`;
      }).join('');
      document.getElementById('ordersAdminList').innerHTML = list || '<p>No hay órdenes</p>';
    };
    renderOrders();
    window.updateOrderStatus = (orderId) => {
      const select = document.getElementById(`statusSelect-${orderId}`);
      const newStatus = select.value;
      const order = orders.find(o => o.id === orderId);
      if (order) { order.status = newStatus; saveOrders(); showToast(`Orden ${orderId} actualizada a ${newStatus}`); showAdminOrders(); }
    };
  }

  function showAdminUsers() {
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Usuarios registrados</h3><div id="usersAdminList">${users.map(u => `<div class="order-item"><b>${u.full_name}</b> (${u.email}) - Cédula: ${u.cedula}<br>KYC: ${u.kyc_status} - Rol: ${u.role}<br><button onclick="verifyKYC('${u.id}')">Aprobar KYC</button> <button onclick="rejectKYC('${u.id}')">Rechazar KYC</button></div>`).join('')}</div>`;
    window.verifyKYC = (userId) => { const user = users.find(u=>u.id===userId); if(user){user.kyc_status='verified'; saveUsers(); showToast('KYC aprobado'); showAdminUsers();} };
    window.rejectKYC = (userId) => { const user = users.find(u=>u.id===userId); if(user){user.kyc_status='rejected'; saveUsers(); showToast('KYC rechazado'); showAdminUsers();} };
  }

  function showAdminSettings() {
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Ajustes de tasa y comisión</h3><label>Tasa (Bs/USD): <input type="number" id="adminRate" value="${settings.rate}"></label><label>Comisión (%): <input type="number" id="adminCommission" value="${settings.commission}" step="0.5"></label><button class="btn-neon" id="saveSettingsBtn">Guardar cambios</button>`;
    document.getElementById('saveSettingsBtn')?.addEventListener('click', () => {
      settings.rate = parseFloat(document.getElementById('adminRate').value);
      settings.commission = parseFloat(document.getElementById('adminCommission').value);
      saveSettings();
      updateFooterRate();
      showToast('Tasa y comisión actualizadas');
      renderView('admin');
    });
  }

  function showAdminManageAdmins() {
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Gestionar Administradores</h3><div id="adminsList"></div><hr><h4>Agregar nuevo administrador</h4><input id="newAdminName" placeholder="Nombre"><input id="newAdminEmail" placeholder="Email"><input id="newAdminPass" type="password" placeholder="Contraseña"><button class="btn-neon" id="createAdminBtn">Crear Admin</button>`;
    const renderAdmins = () => {
      const admins = users.filter(u => u.role === 'admin');
      document.getElementById('adminsList').innerHTML = admins.map(a => `<div>${a.full_name} - ${a.email} <button onclick="deleteAdmin('${a.id}')">Eliminar</button></div>`).join('');
    };
    renderAdmins();
    document.getElementById('createAdminBtn')?.addEventListener('click', () => {
      const name = document.getElementById('newAdminName').value;
      const email = document.getElementById('newAdminEmail').value;
      const pass = document.getElementById('newAdminPass').value;
      if (!name || !email || !pass) { showToast('Complete todos los campos'); return; }
      const newAdmin = { id: Date.now().toString(), full_name: name, email, password: pass, cedula: 'admin'+Date.now(), phone: '', address: '', bank_name: '', bank_account: '', phone_pagomovil: '', kyc_status: 'verified', role: 'admin' };
      users.push(newAdmin);
      saveUsers();
      showToast('Administrador creado');
      showAdminManageAdmins();
    });
    window.deleteAdmin = (id) => { users = users.filter(u => u.id !== id); saveUsers(); showAdminManageAdmins(); };
  }

  function updateNavButtons() {
    const isLogged = !!currentUser;
    document.querySelectorAll('[data-view="register"], [data-view="login"]').forEach(btn => btn.style.display = isLogged ? 'none' : 'inline-block');
    document.getElementById('dashboardNavBtn').style.display = isLogged ? 'inline-block' : 'none';
    document.getElementById('adminNavBtn').style.display = (isLogged && (currentUser?.role === 'admin' || currentUser?.role === 'founder')) ? 'inline-block' : 'none';
    document.getElementById('logoutBtn').style.display = isLogged ? 'inline-block' : 'none';
    if (!isLogged) currentUser = null;
  }

  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-view]');
    if (target) { e.preventDefault(); const view = target.getAttribute('data-view'); renderView(view); }
    if (e.target.id === 'logoutBtn') { sessionStorage.removeItem('starpage_current_user'); currentUser = null; updateNavButtons(); renderView('landing'); showToast('Sesión cerrada'); }
  });

  function renderChat() {
    const container = document.getElementById('chatMessages');
    if (container) container.innerHTML = chatMessages.map(m => `<div><strong>${m.isAdmin ? '🤖 Soporte' : (users.find(u=>u.id===m.userId)?.full_name || 'Usuario')}:</strong> ${m.message}</div>`).join('');
  }
  document.getElementById('chatToggleBtn')?.addEventListener('click', () => {
    const panel = document.getElementById('chatPanel');
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    renderChat();
  });
  document.getElementById('chatSendBtn')?.addEventListener('click', () => {
    const input = document.getElementById('chatInput');
    if (!input.value.trim() || !currentUser) { showToast('Inicia sesión para chatear'); return; }
    chatMessages.push({ userId: currentUser.id, message: input.value, isAdmin: false, timestamp: new Date() });
    saveChat();
    renderChat();
    input.value = '';
    setTimeout(() => {
      if (currentUser?.role === 'admin') return;
      chatMessages.push({ userId: '2', message: 'Gracias por contactarnos, en breve un agente te atenderá.', isAdmin: true });
      saveChat(); renderChat();
    }, 2000);
  });

  updateFooterRate();
  renderView('landing');
  if (currentUser) updateNavButtons();
  renderChat();
  setInterval(() => { updateFooterRate(); }, 1000);
</script>
</body>
</html>
