<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarPage | Acceso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Inter', sans-serif;
    background: #0b0b10;
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#111;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(192,132,252,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#1e1e2a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#9333ea,#4ade80);
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.switch{
    text-align:center;
    margin-top:10px;
    cursor:pointer;
    color:#c084fc;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">Iniciar sesión</h2>

<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<p class="switch" onclick="toggle()">Crear cuenta</p>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AQUI_TU_API_KEY",
  authDomain: "TU_APP.firebaseapp.com",
  projectId: "TU_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.isLogin = true;

window.toggle = function(){
    isLogin = !isLogin;
    document.getElementById("title").innerText = isLogin ? "Iniciar sesión" : "Crear cuenta";
    document.querySelector("button").innerText = isLogin ? "Entrar" : "Registrarme";
}

window.login = function(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(isLogin){
        signInWithEmailAndPassword(auth, email, pass)
        .then(()=>{
            window.location.href = "dashboard.html";
        })
        .catch(e=>alert(e.message));
    }else{
        createUserWithEmailAndPassword(auth, email, pass)
        .then(()=>{
            alert("Cuenta creada");
        })
        .catch(e=>alert(e.message));
    }
}

</script>

</body>
</html>
