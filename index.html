<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | StarPage Business</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="glass-panel" style="width: 420px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="margin:0; font-weight: 800; letter-spacing: -1px;">STAR<span style="color:var(--primary)">PAGE</span></h1>
                <p style="opacity: 0.6; font-size: 0.9rem;">SISTEMA FINANCIERO SEGURO</p>
            </div>

            <!-- Formulario Dinámico -->
            <div id="auth-container">
                <form id="login-form" onsubmit="handleAuth(event, 'login')">
                    <input type="email" id="email" class="modern-input" placeholder="Correo Corporativo" required style="margin-bottom: 15px;">
                    <input type="password" id="pass" class="modern-input" placeholder="Contraseña de Seguridad" required style="margin-bottom: 25px;">
                    <button type="submit" class="btn-premium" style="width: 100%;">Ingresar al Sistema</button>
                    <p style="text-align:center; font-size: 0.85rem; margin-top: 20px;">
                        ¿No tienes cuenta? <span onclick="toggleAuth()" style="color:var(--primary); cursor:pointer;">Crear una ahora</span>
                    </p>
                </form>

                <form id="reg-form" class="hidden" onsubmit="handleAuth(event, 'signup')">
                    <input type="email" id="r-email" class="modern-input" placeholder="Tu mejor Email" required style="margin-bottom: 15px;">
                    <input type="password" id="r-pass" class="modern-input" placeholder="Contraseña (Mín. 6 caracteres)" required style="margin-bottom: 15px;">
                    <input type="text" id="r-dni" class="modern-input" placeholder="Documento de Identidad (DNI/CI)" required style="margin-bottom: 25px;">
                    <button type="submit" class="btn-premium" style="width: 100%;">Registrarme</button>
                    <p style="text-align:center; font-size: 0.85rem; margin-top: 20px;">
                        ¿Ya eres miembro? <span onclick="toggleAuth()" style="color:var(--primary); cursor:pointer;">Iniciar Sesión</span>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* TUS DATOS AQUÍ */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.toggleAuth = () => {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('reg-form').classList.toggle('hidden');
        };

        window.handleAuth = async (e, mode) => {
            e.preventDefault();
            Swal.fire({ title: 'Verificando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                if (mode === 'login') {
                    const email = document.getElementById('email').value;
                    const pass = document.getElementById('pass').value;
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const email = document.getElementById('r-email').value;
                    const pass = document.getElementById('r-pass').value;
                    const dni = document.getElementById('r-dni').value;
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), {
                        email, dni, role: "client", status: "pending", createdAt: new Date()
                    });
                }
            } catch (error) {
                Swal.fire('Error', error.message, 'error');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const role = docSnap.data().role;
                    window.location.href = (role === "admin" || role === "worker") ? "dashboard.html" : "lobby.html";
                }
            }
        });
    </script>
</body>
</html>
