<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Registro KYC Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0b0b10; color: white; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bg-glow { position: absolute; width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(147, 51, 234, 0.4) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; filter: blur(80px); animation: float 12s infinite alternate ease-in-out; z-index: -1; }
        .glow-2 { background: radial-gradient(circle, rgba(192, 132, 252, 0.3) 0%, rgba(0,0,0,0) 70%); top: 15%; right: 5%; animation-delay: -6s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.1); } }

        .container { background: rgba(17, 17, 17, 0.9); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; border: 1px solid rgba(192, 132, 252, 0.2); width: 100%; max-width: 420px; box-shadow: 0 0 50px rgba(147, 51, 234, 0.15); position: relative; }
        h2 { text-align: center; font-weight: 700; margin-bottom: 30px; letter-spacing: -1px; }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i.icon { position: absolute; left: 16px; top: 16px; color: #c084fc; font-size: 18px; }
        input, select { width: 100%; padding: 14px 14px 14px 48px; background: #1a1a24; border: 1px solid #2e2e3a; border-radius: 12px; color: white; box-sizing: border-box; outline: none; transition: all 0.3s; }
        input:focus { border-color: #9333ea; box-shadow: 0 0 10px rgba(147, 51, 234, 0.3); }

        .phone-row { display: flex; gap: 10px; }
        .phone-row select { width: 35%; padding-left: 10px; }
        .phone-row input { width: 65%; padding-left: 15px; }

        .eye-btn { position: absolute; right: 16px; top: 16px; cursor: pointer; color: #666; transition: color 0.3s; }
        .eye-btn:hover { color: #c084fc; }

        .file-box { padding: 15px; background: #1a1a24; border: 2px dashed #444; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .file-box:hover { border-color: #c084fc; background: #232330; }
        .file-box i { display: block; font-size: 24px; margin-bottom: 8px; color: #4ade80; }

        .btn-grad { width: 100%; padding: 16px; background: linear-gradient(135deg, #9333ea, #4ade80); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s, opacity 0.3s; }
        .btn-grad:active { transform: scale(0.97); }
        .btn-grad:disabled { opacity: 0.5; cursor: not-allowed; }

        .switch-link { text-align: center; margin-top: 25px; font-size: 14px; color: #888; }
        .switch-link span { color: #4ade80; cursor: pointer; font-weight: 600; text-decoration: underline; }
        .hidden { display: none; }

        /* Loader de carga inicial */
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b10; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 24px; z-index: 10; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(147, 51, 234, 0.1); border-top: 4px solid #9333ea; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow glow-2"></div>

    <div class="container">
        <div id="loader">
            <div class="spinner"></div>
            <p>Verificando sesión...</p>
        </div>

        <div id="reg-form" class="hidden">
            <h2>Únete a StarPage</h2>
            <div class="input-group">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="email" id="r-email" placeholder="Correo electrónico">
            </div>
            <div class="phone-row input-group">
                <select id="r-prefix">
                    <option value="+58">🇻🇪 +58</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+57">🇨🇴 +57</option>
                </select>
                <input type="tel" id="r-phone" placeholder="WhatsApp">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-address-card icon"></i>
                <input type="text" id="r-dni" placeholder="Nro de Cédula / Pasaporte">
            </div>
            <div class="file-box" onclick="document.getElementById('r-file').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span id="file-name">Subir Foto de Identidad (KYC)</span>
                <input type="file" id="r-file" class="hidden" accept="image/*" onchange="updateFileName(this)">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="r-pass" placeholder="Contraseña segura">
                <i class="fa-solid fa-eye eye-btn" onclick="togglePass('r-pass')"></i>
            </div>
            <button class="btn-grad" id="btn-reg" onclick="handleAuth('signup')">Crear mi Cuenta</button>
            <p class="switch-link">¿Ya tienes cuenta? <span onclick="toggleView()">Inicia sesión</span></p>
        </div>

        <div id="log-form" class="hidden">
            <h2>Acceso Clientes</h2>
            <div class="input-group">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="email" id="l-email" placeholder="Correo electrónico">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="l-pass" placeholder="Tu contraseña">
                <i class="fa-solid fa-eye eye-btn" onclick="togglePass('l-pass')"></i>
            </div>
            <button class="btn-grad" onclick="handleAuth('login')">Entrar</button>
            <p class="switch-link">¿No tienes cuenta? <span onclick="toggleView()">Regístrate</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- SISTEMA ANTI-BLOQUEO: QUITA EL LOADER A LOS 4 SEGUNDOS ---
        const timeout = setTimeout(() => {
            const loader = document.getElementById('loader');
            const logForm = document.getElementById('log-form');
            if (loader) loader.classList.add('hidden');
            if (logForm) logForm.classList.remove('hidden');
        }, 4000);

        // --- VERIFICACIÓN DE SESIÓN ---
        onAuthStateChanged(auth, (user) => {
            clearTimeout(timeout); // Si Firebase responde, cancelamos el reloj de 4 segundos
            
            if (user) {
                const userEmail = user.email.toLowerCase();
                if (userEmail === "yoalexvergara11@gmail.com") {
                    window.location.href = "dashboard.html";
                } else {
                    window.location.href = "vender.html";
                }
            } else {
                // Si no hay sesión, ocultar loader y mostrar login
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('log-form').classList.remove('hidden');
            }
        }, (error) => {
            // Si hay un error de conexión, también quitamos el loader
            clearTimeout(timeout);
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('log-form').classList.remove('hidden');
            console.error("Error validando sesión:", error);
        });

        window.toggleView = () => {
            document.getElementById('reg-form').classList.toggle('hidden');
            document.getElementById('log-form').classList.toggle('hidden');
        };

        window.togglePass = (id) => {
            const x = document.getElementById(id);
            x.type = x.type === "password" ? "text" : "password";
        };

        window.updateFileName = (input) => {
            if (input.files && input.files[0]) {
                document.getElementById('file-name').innerText = "Archivo: " + input.files[0].name;
            }
        };

        window.handleAuth = async (mode) => {
            if (mode === 'signup') {
                const email = document.getElementById('r-email').value.trim();
                const pass = document.getElementById('r-pass').value;
                const dni = document.getElementById('r-dni').value.trim();
                const phone = document.getElementById('r-prefix').value + document.getElementById('r-phone').value.trim();
                const file = document.getElementById('r-file').files[0];

                if (!email || !pass || !dni || !file) {
                    return alert("Por favor completa todos los datos y sube tu foto de identidad.");
                }

                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    const user = userCredential.user;

                    const storageRef = ref(storage, `kyc/${user.uid}`);
                    await uploadBytes(storageRef, file);
                    const photoURL = await getDownloadURL(storageRef);

                    await setDoc(doc(db, "users", user.uid), {
                        email: email.toLowerCase(),
                        phone: phone,
                        dni: dni,
                        photoURL: photoURL,
                        role: "client",
                        status: "pending",
                        createdAt: new Date()
                    });

                    alert("¡Registro Exitoso!");
                    window.location.href = "vender.html";
                } catch (e) {
                    alert("Error en registro: " + e.message);
                }
            } else {
                const emailInput = document.getElementById('l-email').value.trim().toLowerCase();
                const passInput = document.getElementById('l-pass').value;

                if (!emailInput || !passInput) return alert("Ingresa tus credenciales");

                try {
                    const res = await signInWithEmailAndPassword(auth, emailInput, passInput);
                    const userEmail = res.user.email.toLowerCase();

                    if (userEmail === "yoalexvergara11@gmail.com") {
                        window.location.href = "dashboard.html";
                    } else {
                        window.location.href = "vender.html";
                    }
                } catch (e) {
                    alert("Correo o contraseña incorrectos.");
                }
            }
        };
    </script>
</body>
</html>
