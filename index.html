<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>StarPage VE · Intercambio Real</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ========== TODOS TUS ESTILOS (se mantienen igual) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: radial-gradient(circle at 10% 20%, #03050b, #000000);
      color: #eef5ff;
      line-height: 1.5;
    }
    .glass-card {
      background: rgba(8, 18, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: 28px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 12px rgba(0,240,255,0.2);
      transition: all 0.2s ease;
      padding: 1.5rem;
    }
    .neon-text {
      color: #00f0ff;
      text-shadow: 0 0 5px #00f0ff, 0 0 12px #ff6bd6;
    }
    .btn-neon {
      background: linear-gradient(95deg, #00c3ff, #ff6bd6);
      border: none;
      color: #010101;
      font-weight: bold;
      padding: 10px 24px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-neon:hover { transform: scale(1.02); box-shadow: 0 0 18px #ff6bd6; }
    .btn-outline {
      background: transparent;
      border: 1px solid #00f0ff;
      color: #00f0ff;
      border-radius: 40px;
      padding: 8px 18px;
      cursor: pointer;
    }
    input, select, textarea {
      background: #0b1018;
      border: 1px solid #2a3a48;
      padding: 12px 14px;
      border-radius: 20px;
      color: white;
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
    }
    input:focus, select:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 6px cyan; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 5%;
      border-bottom: 1px solid rgba(0,240,255,0.3);
      flex-wrap: wrap;
    }
    .logo { font-size: 1.7rem; font-weight: 800; }
    .badge-ve {
      background: #ff6bd6;
      color: black;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 10px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .main-container { max-width: 1400px; margin: 20px auto; padding: 0 20px 40px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .order-item {
      background: #0f1722;
      border-left: 5px solid #00f0ff;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 20px;
      background: #1e2a3a;
      border-left: 6px solid #00f0ff;
      padding: 12px 20px;
      border-radius: 16px;
      z-index: 2000;
    }
    .chat-widget {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1100;
    }
    .chat-button {
      background: #ff6bd6;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 0 20px #ff6bd6;
    }
    .chat-panel {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 320px;
      height: 450px;
      background: #0a0f1c;
      border-radius: 24px;
      border: 1px solid cyan;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1200;
    }
    .chat-header { padding: 12px; background: #0f1722; border-bottom: 1px solid cyan; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
    .chat-input-area { display: flex; border-top: 1px solid #2a3a48; }
    .chat-input-area input { flex: 1; border: none; border-radius: 0; margin: 0; }
    .chat-input-area button { background: #00f0ff; border: none; padding: 12px; cursor: pointer; }
    footer { text-align: center; padding: 28px 20px; border-top: 1px solid rgba(0,240,255,0.15); margin-top: 40px; font-size: 13px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
    .status-pending { color: #f0b400; }
    .status-processing { color: #00aaff; }
    .status-completed { color: #00cc88; }
    .status-cancelled { color: #ff4466; }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-rocket" style="color:#00f0ff"></i> StarPage<span class="badge-ve">VE</span></div>
  <div class="nav-buttons" id="navButtons">
    <button class="btn-outline" data-view="landing">Inicio</button>
    <button class="btn-outline" data-view="register">Registro</button>
    <button class="btn-outline" data-view="login">Acceso</button>
    <button class="btn-outline" data-view="dashboard" style="display:none;" id="dashboardNavBtn">Dashboard</button>
    <button class="btn-outline" data-view="admin" style="display:none;" id="adminNavBtn">Admin</button>
    <button class="btn-outline" id="logoutBtn" style="display:none;">Salir</button>
  </div>
</header>

<main class="main-container" id="appRoot"></main>

<footer>© StarPage - Todos los derechos reservados a nombre de la empresa StarPage · <span id="rateFooter">Tasa: 600.000 Bs/USD</span></footer>

<!-- Chat widget -->
<div class="chat-widget">
  <div class="chat-button" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></div>
  <div class="chat-panel glass-card" id="chatPanel">
    <div class="chat-header">💬 Soporte en vivo</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Escribe tu mensaje...">
      <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
  // ========== CONEXIÓN REAL A SUPABASE (con tus claves) ==========
  const SUPABASE_URL = "https://drdlldpcyeaavjdqrzec.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyZGxsZHBjeWVhYXZqZHFyemVjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTI1Nzk3NiwiZXhwIjoyMDkwODMzOTc2fQ.xs_UB5AMXLLLJ7A2hKre06MrENMkgNhy3unAWBiWjhE";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Variables globales (sin localStorage, todo desde Supabase)
  let currentUser = null;  // se cargará desde sessionStorage después del login
  let settings = { rate: 600000, commission: 6 };

  function showToast(msg) {
    let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  async function loadSettings() {
    try {
      const { data, error } = await supabase.from('settings').select('*').order('id', { ascending: false }).limit(1);
      if (error) throw error;
      if (data && data.length) {
        settings.rate = data[0].rate_usd_to_bs;
        settings.commission = data[0].commission_percent;
      }
      document.getElementById('rateFooter').innerText = `Tasa: ${settings.rate.toLocaleString()} Bs/USD · Comisión: ${settings.commission}%`;
    } catch (err) {
      console.error(err);
      showToast('Error al cargar tasas, usando valores por defecto');
    }
  }

  // Actualizar footer cada minuto
  setInterval(loadSettings, 60000);

  // ========== REGISTRO REAL ==========
  async function handleRegister(e) {
    e.preventDefault();
    const email = document.getElementById('reg_email').value;
    const password = document.getElementById('reg_password').value;
    const full_name = document.getElementById('reg_name').value;
    const cedula = document.getElementById('reg_cedula').value;

    try {
      // 1. Registrar en auth de Supabase
      const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
      if (authError) throw authError;
      const userId = authData.user.id;

      // 2. Insertar datos en la tabla users
      const { error: userError } = await supabase.from('users').insert([{
        id: userId,
        full_name,
        cedula,
        phone: document.getElementById('reg_phone').value,
        address: document.getElementById('reg_address').value,
        bank_name: document.getElementById('reg_bank').value,
        bank_account: document.getElementById('reg_account').value,
        phone_pagomovil: document.getElementById('reg_pagomovil').value,
        role: 'user',
        kyc_status: 'pending'
      }]);
      if (userError) throw userError;

      showToast('Registro exitoso. Revisa tu correo para confirmar la cuenta.');
      renderView('login');
    } catch (err) {
      showToast('Error: ' + err.message);
    }
  }

  // ========== LOGIN REAL ==========
  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login_email').value;
    const password = document.getElementById('login_password').value;

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;

      // Obtener rol y demás datos de la tabla users
      const { data: userData, error: userError } = await supabase.from('users').select('*').eq('id', data.user.id).single();
      if (userError) throw userError;

      currentUser = {
        id: data.user.id,
        email: data.user.email,
        role: userData.role,
        full_name: userData.full_name,
        kyc_status: userData.kyc_status
      };
      sessionStorage.setItem('starpage_current_user', JSON.stringify(currentUser));
      updateNavButtons();
      renderView('dashboard');
      showToast(`Bienvenido ${currentUser.full_name}`);
    } catch (err) {
      showToast('Error al iniciar sesión: ' + err.message);
    }
  }

  // ========== CERRAR SESIÓN ==========
  async function logout() {
    await supabase.auth.signOut();
    sessionStorage.removeItem('starpage_current_user');
    currentUser = null;
    updateNavButtons();
    renderView('landing');
    showToast('Sesión cerrada');
  }

  // ========== CREAR ORDEN ==========
  async function createOrder(e) {
    e.preventDefault();
    if (!currentUser) { showToast('Debes iniciar sesión'); return; }

    const source = document.getElementById('orderSource').value;
    const amount = parseFloat(document.getElementById('orderAmount').value);
    const destination = document.getElementById('orderDestination').value;
    if (!amount || amount <= 0) { showToast('Monto inválido'); return; }

    const gross = amount * settings.rate;
    const net = gross * (1 - settings.commission / 100);

    try {
      const { error } = await supabase.from('orders').insert([{
        user_id: currentUser.id,
        source_currency: source,
        amount_usd: amount,
        exchange_rate: settings.rate,
        commission_percent: settings.commission,
        net_bs: net,
        destination_account: destination,
        status: 'pending'
      }]);
      if (error) throw error;
      showToast('Orden creada. Sube el comprobante.');
      renderView('dashboard');
    } catch (err) {
      showToast('Error: ' + err.message);
    }
  }

  // ========== SUBIR COMPROBANTE (simulado pero funcional) ==========
  window.uploadProofPrompt = async (orderId) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*,application/pdf';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const fakeUrl = URL.createObjectURL(file);
      const { error } = await supabase.from('orders').update({ payment_proof_url: fakeUrl }).eq('id', orderId);
      if (error) showToast(error.message);
      else showToast('Comprobante subido');
      renderView('dashboard');
    };
    input.click();
  };

  // ========== VISTAS (igual que antes, pero usando datos reales) ==========
  const views = {
    landing: () => `<div class="glass-card" style="text-align:center"><h1 class="neon-text">⚡ StarPage VE</h1><p>Intercambio de monedas digitales (PayPal, Zinli, USDT) a Bolívares vía Pago Móvil o Transferencia.</p><p>Seguro, rápido y con soporte 24/7.</p><button class="btn-neon" data-view="register">Crear cuenta ahora</button></div>`,
    register: () => `<div class="glass-card" style="max-width:600px;margin:auto"><h2>Registro completo</h2><form id="registerForm"><input type="text" id="reg_name" placeholder="Nombre completo" required><input type="text" id="reg_cedula" placeholder="Cédula" required><input type="email" id="reg_email" placeholder="Email" required><input type="tel" id="reg_phone" placeholder="Teléfono"><input type="text" id="reg_address" placeholder="Dirección"><input type="password" id="reg_password" placeholder="Contraseña" required><input type="text" id="reg_bank" placeholder="Banco"><input type="text" id="reg_account" placeholder="Número de cuenta"><input type="text" id="reg_pagomovil" placeholder="Teléfono Pago Móvil"><button type="submit" class="btn-neon">Registrarme</button></form><p>¿Ya tienes cuenta? <a href="#" data-view="login">Inicia sesión</a></p></div>`,
    login: () => `<div class="glass-card" style="max-width:450px;margin:auto"><h2>Acceso</h2><form id="loginForm"><input type="email" id="login_email" placeholder="Email" required><input type="password" id="login_password" placeholder="Contraseña" required><button type="submit" class="btn-neon">Entrar</button></form><p>¿Sin cuenta? <a href="#" data-view="register">Regístrate</a></p></div>`,
    dashboard: async () => {
      if (!currentUser) return '<p>Debes iniciar sesión.</p>';
      const { data: userOrders } = await supabase.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
      return `<div class="dashboard-grid"><div class="glass-card"><h2>💰 Calculadora de cambio</h2><label>Monto en USD: <input type="number" id="calcUsd" value="100"></label><p>Tasa actual: ${settings.rate.toLocaleString()} Bs/USD</p><p>Comisión: ${settings.commission}%</p><p><strong>Recibirás: <span id="calcResult">0</span> Bs</strong></p><hr><h3>Crear nueva orden</h3><form id="createOrderForm"><select id="orderSource"><option>PayPal</option><option>Zinli</option><option>USDT</option></select><input type="number" id="orderAmount" placeholder="Monto USD" required><input type="text" id="orderDestination" placeholder="Cuenta destino (Pago Móvil o Transferencia)" required><button type="submit" class="btn-neon">Generar orden</button></form><div id="orderResult"></div></div><div class="glass-card"><h3>📋 Mis órdenes</h3><div id="myOrdersList">${userOrders.map(o => `<div class="order-item"><strong>ID:</strong> ${o.id}<br><strong>Monto:</strong> $${o.amount_usd}<br><strong>Neto Bs:</strong> ${o.net_bs.toLocaleString()}<br><strong>Estado:</strong> <span class="status-${o.status}">${o.status}</span><br>${o.payment_proof_url ? `<a href="${o.payment_proof_url}" target="_blank">Ver comprobante</a>` : `<button class="btn-outline" onclick="uploadProofPrompt('${o.id}')">Subir comprobante</button>`}</div>`).join('') || '<p>No hay órdenes</p>'}</div></div></div>`;
    },
    admin: () => {
      if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'founder')) return '<p>Acceso denegado.</p>';
      return `<div class="glass-card"><h2>Panel de Administración</h2><div style="display:flex;gap:20px;flex-wrap:wrap;"><button id="adminShowOrdersBtn" class="btn-outline">Órdenes</button><button id="adminShowUsersBtn" class="btn-outline">Usuarios</button><button id="adminShowSettingsBtn" class="btn-outline">Ajustes (Tasa/Comisión)</button>${currentUser.role === 'founder' ? '<button id="adminManageAdminsBtn" class="btn-outline">Gestionar Admins</button>' : ''}</div><div id="adminContent"></div></div>`;
    }
  };

  async function renderView(viewName) {
    const container = document.getElementById('appRoot');
    if (typeof views[viewName] === 'function') {
      // Si es async (dashboard) lo manejamos con then
      const content = await views[viewName]();
      container.innerHTML = content;
    } else {
      container.innerHTML = views[viewName]();
    }
    // Bindings después de renderizar
    if (viewName === 'register') document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
    if (viewName === 'login') document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
    if (viewName === 'dashboard') {
      const calcInput = document.getElementById('calcUsd');
      if (calcInput) {
        const updateCalc = () => {
          const usd = parseFloat(calcInput.value) || 0;
          const gross = usd * settings.rate;
          const net = gross * (1 - settings.commission / 100);
          document.getElementById('calcResult').innerText = net.toLocaleString();
        };
        calcInput.addEventListener('input', updateCalc);
        updateCalc();
      }
      document.getElementById('createOrderForm')?.addEventListener('submit', createOrder);
    }
    if (viewName === 'admin') {
      document.getElementById('adminShowOrdersBtn')?.addEventListener('click', showAdminOrders);
      document.getElementById('adminShowUsersBtn')?.addEventListener('click', showAdminUsers);
      document.getElementById('adminShowSettingsBtn')?.addEventListener('click', showAdminSettings);
      if (currentUser?.role === 'founder') document.getElementById('adminManageAdminsBtn')?.addEventListener('click', showAdminManageAdmins);
      showAdminOrders();
    }
  }

  // ========== FUNCIONES DE ADMIN (reales con Supabase) ==========
  async function showAdminOrders() {
    const { data } = await supabase.from('orders').select('*, users(full_name, email)').order('created_at', { ascending: false });
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Todas las órdenes</h3><div id="ordersAdminList">${data.map(o => `<div class="order-item"><b>Orden ${o.id}</b> - Usuario: ${o.users?.full_name || '?'}<br>Monto: $${o.amount_usd} → ${o.net_bs.toLocaleString()} Bs<br>Estado: <span class="status-${o.status}">${o.status}</span><br><select id="statusSelect-${o.id}"><option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='processing'?'selected':''}>processing</option><option ${o.status==='completed'?'selected':''}>completed</option><option ${o.status==='cancelled'?'selected':''}>cancelled</option></select><button onclick="updateOrderStatus('${o.id}')">Actualizar</button> ${o.payment_proof_url ? '<a href="'+o.payment_proof_url+'" target="_blank">Ver comprobante</a>' : 'Sin comprobante'}</div>`).join('')}</div>`;
    window.updateOrderStatus = async (orderId) => {
      const newStatus = document.getElementById(`statusSelect-${orderId}`).value;
      await supabase.from('orders').update({ status: newStatus }).eq('id', orderId);
      showToast('Estado actualizado');
      showAdminOrders();
    };
  }

  async function showAdminUsers() {
    const { data } = await supabase.from('users').select('*');
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Usuarios registrados</h3><div id="usersAdminList">${data.map(u => `<div class="order-item"><b>${u.full_name}</b> (${u.email}) - Cédula: ${u.cedula}<br>KYC: ${u.kyc_status} - Rol: ${u.role}<br><button onclick="verifyKYC('${u.id}')">Aprobar KYC</button> <button onclick="rejectKYC('${u.id}')">Rechazar KYC</button></div>`).join('')}</div>`;
    window.verifyKYC = async (userId) => { await supabase.from('users').update({ kyc_status: 'verified' }).eq('id', userId); showToast('KYC aprobado'); showAdminUsers(); };
    window.rejectKYC = async (userId) => { await supabase.from('users').update({ kyc_status: 'rejected' }).eq('id', userId); showToast('KYC rechazado'); showAdminUsers(); };
  }

  async function showAdminSettings() {
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Ajustes de tasa y comisión</h3><label>Tasa (Bs/USD): <input type="number" id="adminRate" value="${settings.rate}"></label><label>Comisión (%): <input type="number" id="adminCommission" value="${settings.commission}" step="0.5"></label><button class="btn-neon" id="saveSettingsBtn">Guardar cambios</button>`;
    document.getElementById('saveSettingsBtn')?.addEventListener('click', async () => {
      const newRate = parseFloat(document.getElementById('adminRate').value);
      const newComm = parseFloat(document.getElementById('adminCommission').value);
      await supabase.from('settings').insert([{ rate_usd_to_bs: newRate, commission_percent: newComm }]);
      await loadSettings();
      showToast('Tasa y comisión actualizadas');
      renderView('admin');
    });
  }

  async function showAdminManageAdmins() {
    const { data: allUsers } = await supabase.from('users').select('*');
    const admins = allUsers.filter(u => u.role === 'admin');
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Gestionar Administradores</h3><div id="adminsList">${admins.map(a => `<div>${a.full_name} - ${a.email} <button onclick="deleteAdmin('${a.id}')">Eliminar</button></div>`).join('')}</div><hr><h4>Agregar nuevo administrador</h4><input id="newAdminName" placeholder="Nombre"><input id="newAdminEmail" placeholder="Email"><input id="newAdminPass" type="password" placeholder="Contraseña"><button class="btn-neon" id="createAdminBtn">Crear Admin</button>`;
    document.getElementById('createAdminBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('newAdminName').value;
      const email = document.getElementById('newAdminEmail').value;
      const pass = document.getElementById('newAdminPass').value;
      if (!name || !email || !pass) { showToast('Complete todos los campos'); return; }
      // Registrar en auth y luego en users
      const { data: authData, error: authError } = await supabase.auth.signUp({ email, password: pass });
      if (authError) { showToast(authError.message); return; }
      const { error: userError } = await supabase.from('users').insert([{
        id: authData.user.id, full_name: name, email, cedula: 'admin'+Date.now(),
        role: 'admin', kyc_status: 'verified'
      }]);
      if (userError) showToast(userError.message);
      else showToast('Administrador creado');
      showAdminManageAdmins();
    });
    window.deleteAdmin = async (id) => {
      await supabase.from('users').delete().eq('id', id);
      showToast('Administrador eliminado');
      showAdminManageAdmins();
    };
  }

  function updateNavButtons() {
    const isLogged = !!currentUser;
    document.querySelectorAll('[data-view="register"], [data-view="login"]').forEach(btn => btn.style.display = isLogged ? 'none' : 'inline-block');
    document.getElementById('dashboardNavBtn').style.display = isLogged ? 'inline-block' : 'none';
    document.getElementById('adminNavBtn').style.display = (isLogged && (currentUser?.role === 'admin' || currentUser?.role === 'founder')) ? 'inline-block' : 'none';
    document.getElementById('logoutBtn').style.display = isLogged ? 'inline-block' : 'none';
  }

  // Navegación
  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-view]');
    if (target) { e.preventDefault(); renderView(target.getAttribute('data-view')); }
    if (e.target.id === 'logoutBtn') logout();
  });

  // ========== CHAT EN VIVO (real con Supabase) ==========
  let chatMessages = [];
  async function loadChat() {
    const { data } = await supabase.from('chat_messages').select('*, users(full_name)').order('created_at', { ascending: true });
    if (data) chatMessages = data;
    const container = document.getElementById('chatMessages');
    if (container) container.innerHTML = chatMessages.map(m => `<div><strong>${m.is_admin ? '🤖 Soporte' : (m.users?.full_name || 'Usuario')}:</strong> ${m.message}</div>`).join('');
  }
  document.getElementById('chatToggleBtn')?.addEventListener('click', () => {
    const panel = document.getElementById('chatPanel');
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    loadChat();
  });
  document.getElementById('chatSendBtn')?.addEventListener('click', async () => {
    const input = document.getElementById('chatInput');
    if (!input.value.trim() || !currentUser) { showToast('Inicia sesión para chatear'); return; }
    await supabase.from('chat_messages').insert([{ user_id: currentUser.id, message: input.value, is_admin: false }]);
    input.value = '';
    loadChat();
  });

  // Inicializar
  loadSettings();
  // Recuperar sesión si existe
  const savedUser = sessionStorage.getItem('starpage_current_user');
  if (savedUser) {
    currentUser = JSON.parse(savedUser);
    updateNavButtons();
    renderView('dashboard');
  } else {
    renderView('landing');
  }
</script>
</body>
</html>
