<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>StarPage VE · Intercambio Real con Supabase</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: radial-gradient(circle at 10% 20%, #03050b, #000000); color: #eef5ff; line-height: 1.5; }
    .glass-card { background: rgba(8,18,28,0.75); backdrop-filter: blur(12px); border: 1px solid rgba(0,240,255,0.25); border-radius: 28px; padding: 1.5rem; margin-bottom: 1rem; }
    .neon-text { color: #00f0ff; text-shadow: 0 0 5px #00f0ff, 0 0 12px #ff6bd6; }
    .btn-neon { background: linear-gradient(95deg, #00c3ff, #ff6bd6); border: none; color: #010101; font-weight: bold; padding: 10px 24px; border-radius: 60px; cursor: pointer; transition: 0.2s; }
    .btn-neon:hover { transform: scale(1.02); opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid #00f0ff; color: #00f0ff; border-radius: 40px; padding: 8px 18px; cursor: pointer; transition: 0.2s; }
    .btn-outline:hover { background: #00f0ff20; }
    input, select { background: #0b1018; border: 1px solid #2a3a48; padding: 12px; border-radius: 20px; color: white; width: 100%; margin: 6px 0 12px; outline: none; }
    input:focus, select:focus { border-color: #00f0ff; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 18px 5%; border-bottom: 1px solid rgba(0,240,255,0.3); flex-wrap: wrap; gap: 15px; }
    .logo { font-size: 1.7rem; font-weight: 800; }
    .badge-ve { background: #ff6bd6; color: black; font-size: 0.7rem; border-radius: 30px; padding: 2px 10px; margin-left: 8px; }
    .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .main-container { max-width: 1400px; margin: 20px auto; padding: 0 20px 40px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .order-item { background: #0f1722; border-left: 5px solid #00f0ff; border-radius: 20px; padding: 16px; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 30px; left: 20px; background: #1e2a3a; border-left: 6px solid #00f0ff; padding: 12px 20px; border-radius: 16px; z-index: 2000; animation: fadein 0.3s; }
    @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .chat-widget { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
    .chat-button { background: #ff6bd6; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; box-shadow: 0 0 20px #ff6bd6; }
    .chat-panel { position: fixed; bottom: 90px; right: 24px; width: 320px; height: 450px; background: #0a0f1c; border-radius: 24px; border: 1px solid cyan; display: none; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 12px; background: #0f1722; border-bottom: 1px solid cyan; font-weight: bold; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
    .chat-input-area { display: flex; border-top: 1px solid #2a3a48; }
    .chat-input-area input { flex: 1; border: none; border-radius: 0; margin: 0; }
    .chat-input-area button { background: #00f0ff; border: none; padding: 12px; cursor: pointer; color: black; }
    footer { text-align: center; padding: 28px 20px; border-top: 1px solid rgba(0,240,255,0.15); margin-top: 40px; font-size: 13px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
    .status-pending { color: #f0b400; }
    .status-processing { color: #00aaff; }
    .status-completed { color: #00cc88; }
    .status-cancelled { color: #ff4466; }
    a { color: #00f0ff; cursor: pointer; text-decoration: none; }
    hr { margin: 16px 0; border-color: #2a3a48; }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-rocket" style="color:#00f0ff"></i> StarPage<span class="badge-ve">VE</span></div>
  <div class="nav-buttons" id="navButtons">
    <button class="btn-outline" data-view="landing">Inicio</button>
    <button class="btn-outline" data-view="register">Registro</button>
    <button class="btn-outline" data-view="login">Acceso</button>
    <button class="btn-outline" data-view="dashboard" style="display:none;" id="dashboardNavBtn">Dashboard</button>
    <button class="btn-outline" data-view="admin" style="display:none;" id="adminNavBtn">Admin</button>
    <button class="btn-outline" id="logoutBtn" style="display:none;">Salir</button>
  </div>
</header>

<main class="main-container" id="appRoot"></main>
<footer>© StarPage · <span id="rateFooter">Cargando tasas...</span></footer>

<div class="chat-widget">
  <div class="chat-button" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></div>
  <div class="chat-panel glass-card" id="chatPanel">
    <div class="chat-header">💬 Soporte en vivo</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Escribe tu mensaje...">
      <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURACIÓN SUPABASE (CAMBIA AQUÍ TUS DATOS) ==========
  const SUPABASE_URL = sb_publishable_38DviMPudTo2uM1QdzCh5g_7B1cyEmx;    // <--- REEMPLAZAR
  const SUPABASE_ANON_KEY =sb_publishable_38DviMPudTo2uM1QdzCh5g_7B1cyEmx;                  // <--- REEMPLAZAR
  const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Estado global
  let currentUser = null;
  let currencies = [];        // { code, rate, commission, receiving_account }
  let allOrders = [];

  // Helpers
  function showToast(msg, error = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderLeftColor = error ? '#ff4466' : '#00f0ff';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  async function loadCurrencies() {
    const { data, error } = await supabase
      .from('platform_settings')
      .select('*')
      .eq('type', 'currency');
    if (error) {
      console.error(error);
      showToast('Error cargando tasas', true);
      return;
    }
    currencies = data.map(c => ({
      code: c.key,
      rate: c.rate_value,
      commission: c.commission_value,
      receiving_account: c.receiving_account
    }));
    updateFooter();
  }

  async function loadUserOrders() {
    if (!currentUser) return;
    const { data, error } = await supabase
      .from('orders')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });
    if (!error) allOrders = data || [];
  }

  async function loadAdminData() {
    if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'founder')) return;
    const { data: ordersData } = await supabase.from('orders').select('*, users(full_name, email)');
    if (ordersData) allOrders = ordersData;
  }

  function updateFooter() {
    const footerSpan = document.getElementById('rateFooter');
    if (footerSpan && currencies.length) {
      footerSpan.innerHTML = currencies.map(c => `${c.code}: ${c.rate.toLocaleString()} Bs/USD (${c.commission}%)`).join(' · ');
    }
  }

  // Cálculo automático en dashboard
  function attachCalculator() {
    const currencySelect = document.getElementById('calcCurrency');
    const amountInput = document.getElementById('calcAmount');
    const resultSpan = document.getElementById('calcResult');
    const receiveAccountSpan = document.getElementById('receiveAccountInfo');
    if (!currencySelect || !amountInput) return;

    function updateCalculation() {
      const selectedCode = currencySelect.value;
      const currency = currencies.find(c => c.code === selectedCode);
      if (!currency) return;
      const usd = parseFloat(amountInput.value) || 0;
      const net = usd * currency.rate * (1 - currency.commission / 100);
      if (resultSpan) resultSpan.innerText = net.toLocaleString(undefined, { maximumFractionDigits: 2 });
      if (receiveAccountSpan) receiveAccountSpan.innerText = currency.receiving_account || 'No definida';
    }
    currencySelect.addEventListener('change', updateCalculation);
    amountInput.addEventListener('input', updateCalculation);
    updateCalculation();
  }

  // Vistas (Landing, Register, Login, Dashboard, Admin)
  function renderView(view) {
    const container = document.getElementById('appRoot');
    if (!container) return;
    if (view === 'landing') {
      container.innerHTML = `<div class="glass-card" style="text-align:center"><h1 class="neon-text">⚡ StarPage VE</h1><p>Intercambio de monedas digitales a Bolívares.</p><button class="btn-neon" data-view="register">Crear cuenta</button></div>`;
    } else if (view === 'register') {
      container.innerHTML = `<div class="glass-card" style="max-width:600px;margin:auto"><h2>Registro</h2><form id="registerForm"><input type="text" id="reg_name" placeholder="Nombre completo" required><input type="text" id="reg_cedula" placeholder="Cédula"><input type="email" id="reg_email" placeholder="Email" required><input type="tel" id="reg_phone" placeholder="Teléfono"><input type="text" id="reg_address" placeholder="Dirección"><input type="password" id="reg_password" placeholder="Contraseña" required><input type="text" id="reg_bank" placeholder="Banco"><input type="text" id="reg_account" placeholder="Número de cuenta"><input type="text" id="reg_pagomovil" placeholder="Teléfono Pago Móvil"><button type="submit" class="btn-neon">Registrarme</button></form><p>¿Ya tienes cuenta? <a href="#" data-view="login">Inicia sesión</a></p></div>`;
      document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
    } else if (view === 'login') {
      container.innerHTML = `<div class="glass-card" style="max-width:450px;margin:auto"><h2>Acceso</h2><form id="loginForm"><input type="email" id="login_email" placeholder="Email" required><input type="password" id="login_password" placeholder="Contraseña" required><button type="submit" class="btn-neon">Entrar</button></form><p>¿Sin cuenta? <a href="#" data-view="register">Regístrate</a></p></div>`;
      document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
    } else if (view === 'dashboard') {
      if (!currentUser) { renderView('login'); return; }
      loadUserOrders().then(() => {
        container.innerHTML = `<div class="dashboard-grid"><div class="glass-card"><h2>💰 Calculadora de cambio</h2><label>Moneda: <select id="calcCurrency">${currencies.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}</select></label><label>Monto USD: <input type="number" id="calcAmount" value="100"></label><p>Tasa + comisión aplicada</p><p><strong>Recibirás: <span id="calcResult">0</span> Bs</strong></p><p>Cuenta para pagar: <strong id="receiveAccountInfo"></strong></p><hr><h3>Crear orden</h3><form id="createOrderForm"><select id="orderSource">${currencies.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}</select><input type="number" id="orderAmount" placeholder="Monto USD" required><input type="text" id="orderDestination" placeholder="Tu cuenta destino (Pago Móvil)" required><button type="submit" class="btn-neon">Generar orden</button></form></div><div class="glass-card"><h3>📋 Mis órdenes</h3><div id="myOrdersList">${allOrders.map(o => `<div class="order-item"><strong>${o.id}</strong> - $${o.amount_usd} → ${parseFloat(o.net_bs).toLocaleString()} Bs<br>Estado: <span class="status-${o.status}">${o.status}</span><br><button class="btn-outline" onclick="uploadProof('${o.id}')">Subir comprobante</button></div>`).join('') || '<p>No hay órdenes</p>'}</div></div></div>`;
        attachCalculator();
        document.getElementById('createOrderForm')?.addEventListener('submit', createOrder);
      });
    } else if (view === 'admin') {
      if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'founder')) { renderView('dashboard'); return; }
      loadAdminData().then(() => {
        container.innerHTML = `<div class="glass-card"><h2>Panel Admin</h2><div style="display:flex;gap:20px;flex-wrap:wrap;"><button id="adminOrdersBtn" class="btn-outline">Órdenes</button><button id="adminCurrenciesBtn" class="btn-outline">Tasas y Cuentas</button></div><div id="adminContent"></div></div>`;
        document.getElementById('adminOrdersBtn')?.addEventListener('click', showAdminOrders);
        document.getElementById('adminCurrenciesBtn')?.addEventListener('click', showAdminCurrencies);
        showAdminOrders();
      });
    }
  }

  // Registro con Supabase
  async function handleRegister(e) {
    e.preventDefault();
    const email = document.getElementById('reg_email').value.trim();
    const password = document.getElementById('reg_password').value;
    const full_name = document.getElementById('reg_name').value.trim();
    if (!email || !password || !full_name) return showToast('Completa campos obligatorios', true);
    const { data, error } = await supabase.from('users').insert([{ email, password, full_name, role: 'user', kyc_status: 'pending' }]).select();
    if (error) return showToast(error.message, true);
    showToast('Registro exitoso, ahora inicia sesión');
    renderView('login');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login_email').value.trim();
    const password = document.getElementById('login_password').value;
    const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password', password);
    if (error || !data || data.length === 0) return showToast('Email o contraseña incorrectos', true);
    currentUser = data[0];
    sessionStorage.setItem('starpage_user', JSON.stringify(currentUser));
    updateNavButtons();
    renderView('dashboard');
    showToast(`Bienvenido ${currentUser.full_name}`);
  }

  async function createOrder(e) {
    e.preventDefault();
    const amount = parseFloat(document.getElementById('orderAmount').value);
    const dest = document.getElementById('orderDestination').value.trim();
    const source = document.getElementById('orderSource').value;
    if (!amount || amount <= 0) return showToast('Monto inválido', true);
    const currency = currencies.find(c => c.code === source);
    if (!currency) return;
    const net = amount * currency.rate * (1 - currency.commission / 100);
    const orderId = 'ORD-' + Date.now();
    const { error } = await supabase.from('orders').insert([{ id: orderId, user_id: currentUser.id, amount_usd: amount, net_bs: net, status: 'pending', source_currency: source, destination_account: dest }]);
    if (error) return showToast('Error al crear orden', true);
    showToast('Orden creada');
    renderView('dashboard');
  }

  window.uploadProof = async (orderId) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (file) {
        const fakeUrl = URL.createObjectURL(file);
        await supabase.from('orders').update({ payment_proof_url: fakeUrl }).eq('id', orderId);
        showToast('Comprobante subido (simulado)');
        renderView('dashboard');
      }
    };
    input.click();
  };

  async function showAdminOrders() {
    const { data } = await supabase.from('orders').select('*, users(full_name, email)');
    const container = document.getElementById('adminContent');
    if (!container) return;
    container.innerHTML = `<h3>📦 Órdenes</h3>${(data || []).map(o => `<div class="order-item"><b>${o.id}</b> - ${o.users?.full_name} ($${o.amount_usd})<br>Estado: ${o.status}<br><select id="status-${o.id}"><option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='processing'?'selected':''}>processing</option><option ${o.status==='completed'?'selected':''}>completed</option></select><button class="btn-neon" onclick="updateOrderStatus('${o.id}')">Actualizar</button></div>`).join('')}`;
  }

  window.updateOrderStatus = async (id) => {
    const newStatus = document.getElementById(`status-${id}`).value;
    await supabase.from('orders').update({ status: newStatus }).eq('id', id);
    showToast('Estado actualizado');
    showAdminOrders();
  };

  async function showAdminCurrencies() {
    const { data } = await supabase.from('platform_settings').select('*').eq('type', 'currency');
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>💰 Tasas y cuentas receptoras</h3>${data.map(c => `<div class="admin-currency-row"><strong>${c.key}</strong><input id="rate-${c.key}" value="${c.rate_value}" placeholder="Tasa"><input id="comm-${c.key}" value="${c.commission_value}" placeholder="Comisión %"><input id="acc-${c.key}" value="${c.receiving_account || ''}" placeholder="Cuenta receptora"><button class="btn-outline" onclick="updateCurrency('${c.key}')">Guardar</button></div>`).join('')}<button id="refreshCurrencies" class="btn-neon">Refrescar</button>`;
    document.getElementById('refreshCurrencies')?.addEventListener('click', () => loadCurrencies().then(() => showAdminCurrencies()));
  }

  window.updateCurrency = async (key) => {
    const rate = parseFloat(document.getElementById(`rate-${key}`).value);
    const commission = parseFloat(document.getElementById(`comm-${key}`).value);
    const account = document.getElementById(`acc-${key}`).value;
    if (isNaN(rate) || isNaN(commission)) return showToast('Valores inválidos', true);
    await supabase.from('platform_settings').update({ rate_value: rate, commission_value: commission, receiving_account: account }).eq('key', key).eq('type', 'currency');
    showToast(`${key} actualizado`);
    await loadCurrencies();
    showAdminCurrencies();
  };

  // Chat en tiempo real simplificado
  async function loadChat() {
    const { data } = await supabase.from('chat_messages').select('*, users(full_name)').order('created_at', { ascending: true });
    const container = document.getElementById('chatMessages');
    if (container && data) {
      container.innerHTML = data.map(m => `<div><strong>${m.users?.full_name || 'Usuario'}:</strong> ${m.message}</div>`).join('');
    }
  }
  async function sendChatMessage(msg) {
    if (!currentUser) return showToast('Inicia sesión para chatear', true);
    await supabase.from('chat_messages').insert([{ user_id: currentUser.id, message: msg, is_admin: (currentUser.role === 'admin' || currentUser.role === 'founder') }]);
    loadChat();
  }

  function updateNavButtons() {
    const isLogged = !!currentUser;
    document.querySelectorAll('[data-view="register"], [data-view="login"]').forEach(btn => btn.style.display = isLogged ? 'none' : 'inline-block');
    const dashBtn = document.getElementById('dashboardNavBtn');
    if (dashBtn) dashBtn.style.display = isLogged ? 'inline-block' : 'none';
    const adminBtn = document.getElementById('adminNavBtn');
    if (adminBtn) adminBtn.style.display = (isLogged && (currentUser?.role === 'admin' || currentUser?.role === 'founder')) ? 'inline-block' : 'none';
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.style.display = isLogged ? 'inline-block' : 'none';
  }
  function logout() {
    sessionStorage.removeItem('starpage_user');
    currentUser = null;
    updateNavButtons();
    renderView('landing');
    showToast('Sesión cerrada');
  }

  // Eventos globales
  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-view]');
    if (target) {
      e.preventDefault();
      const view = target.getAttribute('data-view');
      if (view === 'logout') logout();
      else renderView(view);
    }
    if (e.target.id === 'logoutBtn') logout();
  });
  document.getElementById('chatToggleBtn')?.addEventListener('click', () => {
    const panel = document.getElementById('chatPanel');
    if (panel) panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    loadChat();
  });
  document.getElementById('chatSendBtn')?.addEventListener('click', () => {
    const input = document.getElementById('chatInput');
    if (input.value.trim()) sendChatMessage(input.value);
    input.value = '';
  });

  // Inicialización
  async function init() {
    await loadCurrencies();
    const stored = sessionStorage.getItem('starpage_user');
    if (stored) {
      currentUser = JSON.parse(stored);
      updateNavButtons();
      renderView('dashboard');
    } else {
      renderView('landing');
    }
  }
  init();
</script>
</body>
</html>
