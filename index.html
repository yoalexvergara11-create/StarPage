<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>StarPage VE · Intercambio Real</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: radial-gradient(circle at 10% 20%, #03050b, #000000);
      color: #eef5ff;
      line-height: 1.5;
    }
    .glass-card {
      background: rgba(8, 18, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: 28px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 12px rgba(0,240,255,0.2);
      padding: 1.5rem;
    }
    .neon-text {
      color: #00f0ff;
      text-shadow: 0 0 5px #00f0ff, 0 0 12px #ff6bd6;
    }
    .btn-neon {
      background: linear-gradient(95deg, #00c3ff, #ff6bd6);
      border: none;
      color: #010101;
      font-weight: bold;
      padding: 10px 24px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-neon:hover { transform: scale(1.02); box-shadow: 0 0 18px #ff6bd6; }
    .btn-outline {
      background: transparent;
      border: 1px solid #00f0ff;
      color: #00f0ff;
      border-radius: 40px;
      padding: 8px 18px;
      cursor: pointer;
    }
    input, select, textarea {
      background: #0b1018;
      border: 1px solid #2a3a48;
      padding: 12px 14px;
      border-radius: 20px;
      color: white;
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
    }
    input:focus, select:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 6px cyan; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 5%;
      border-bottom: 1px solid rgba(0,240,255,0.3);
      flex-wrap: wrap;
    }
    .logo { font-size: 1.7rem; font-weight: 800; }
    .badge-ve {
      background: #ff6bd6;
      color: black;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 10px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .main-container { max-width: 1400px; margin: 20px auto; padding: 0 20px 40px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .order-item {
      background: #0f1722;
      border-left: 5px solid #00f0ff;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 20px;
      background: #1e2a3a;
      border-left: 6px solid #00f0ff;
      padding: 12px 20px;
      border-radius: 16px;
      z-index: 2000;
    }
    .chat-widget {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1100;
    }
    .chat-button {
      background: #ff6bd6;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 0 20px #ff6bd6;
    }
    .chat-panel {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 320px;
      height: 450px;
      background: #0a0f1c;
      border-radius: 24px;
      border: 1px solid cyan;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1200;
    }
    .chat-header { padding: 12px; background: #0f1722; border-bottom: 1px solid cyan; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
    .chat-input-area { display: flex; border-top: 1px solid #2a3a48; }
    .chat-input-area input { flex: 1; border: none; border-radius: 0; margin: 0; }
    .chat-input-area button { background: #00f0ff; border: none; padding: 12px; cursor: pointer; }
    footer { text-align: center; padding: 28px 20px; border-top: 1px solid rgba(0,240,255,0.15); margin-top: 40px; font-size: 13px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
    .status-pending { color: #f0b400; }
    .status-processing { color: #00aaff; }
    .status-completed { color: #00cc88; }
    .status-cancelled { color: #ff4466; }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-rocket" style="color:#00f0ff"></i> StarPage<span class="badge-ve">VE</span></div>
  <div class="nav-buttons" id="navButtons">
    <button class="btn-outline" data-view="landing">Inicio</button>
    <button class="btn-outline" data-view="register">Registro</button>
    <button class="btn-outline" data-view="login">Acceso</button>
    <button class="btn-outline" data-view="dashboard" style="display:none;" id="dashboardNavBtn">Dashboard</button>
    <button class="btn-outline" data-view="admin" style="display:none;" id="adminNavBtn">Admin</button>
    <button class="btn-outline" id="logoutBtn" style="display:none;">Salir</button>
  </div>
</header>

<main class="main-container" id="appRoot"></main>

<footer>© StarPage - Todos los derechos reservados · <span id="rateFooter">Tasa: 600.000 Bs/USD</span></footer>

<div class="chat-widget">
  <div class="chat-button" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></div>
  <div class="chat-panel glass-card" id="chatPanel">
    <div class="chat-header">💬 Soporte en vivo</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Escribe tu mensaje...">
      <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURACIÓN DE SUPABASE (TUS CLAVES YA PUESTAS) ==========
  const SUPABASE_URL = "https://drdlldpcyeaavjdqrzec.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyZGxsZHBjeWVhYXZqZHFyemVjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTI1Nzk3NiwiZXhwIjoyMDkwODMzOTc2fQ.xs_UB5AMXLLLJ7A2hKre06MrENMkgNhy3unAWBiWjhE";
  // =========================================================================

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = JSON.parse(sessionStorage.getItem('starpage_current_user')) || null;
  let settings = { rate_usd_to_bs: 600000, commission_percent: 6 };

  function showToast(msg) {
    let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  async function loadSettings() {
    const { data } = await supabase.from('settings').select('*').order('id', { ascending: false }).limit(1);
    if (data && data.length) settings = data[0];
    document.getElementById('rateFooter').innerText = `Tasa: ${settings.rate_usd_to_bs.toLocaleString()} Bs/USD · Comisión: ${settings.commission_percent}%`;
  }

  async function handleRegister(e) {
    e.preventDefault();
    const email = document.getElementById('reg_email').value;
    const password = document.getElementById('reg_password').value;
    const full_name = document.getElementById('reg_name').value;
    const cedula = document.getElementById('reg_cedula').value;
    
    const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
    if (authError) return showToast(authError.message);
    
    const userId = authData.user.id;
    const { error: userError } = await supabase.from('users').insert([{
      id: userId, full_name, cedula,
      phone: document.getElementById('reg_phone').value,
      address: document.getElementById('reg_address').value,
      bank_name: document.getElementById('reg_bank').value,
      bank_account: document.getElementById('reg_account').value,
      phone_pagomovil: document.getElementById('reg_pagomovil').value,
      role: 'user'
    }]);
    if (userError) showToast(userError.message);
    else showToast('Registro exitoso. Revisa tu correo para confirmar.');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login_email').value;
    const password = document.getElementById('login_password').value;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return showToast(error.message);
    
    const { data: userData } = await supabase.from('users').select('*').eq('id', data.user.id).single();
    currentUser = { id: data.user.id, email, role: userData.role, full_name: userData.full_name, kyc_status: userData.kyc_status };
    sessionStorage.setItem('starpage_current_user', JSON.stringify(currentUser));
    updateNavButtons();
    renderView('dashboard');
    showToast(`Bienvenido ${currentUser.full_name}`);
  }

  async function logout() {
    await supabase.auth.signOut();
    sessionStorage.removeItem('starpage_current_user');
    currentUser = null;
    updateNavButtons();
    renderView('landing');
  }

  async function createOrder(e) {
    e.preventDefault();
    const source = document.getElementById('orderSource').value;
    const amount = parseFloat(document.getElementById('orderAmount').value);
    const destination = document.getElementById('orderDestination').value;
    if (!amount || amount <= 0) return showToast('Monto inválido');
    const gross = amount * settings.rate_usd_to_bs;
    const net = gross * (1 - settings.commission_percent / 100);
    const { error } = await supabase.from('orders').insert([{
      user_id: currentUser.id,
      source_currency: source,
      amount_usd: amount,
      exchange_rate: settings.rate_usd_to_bs,
      commission_percent: settings.commission_percent,
      net_bs: net,
      destination_account: destination,
      status: 'pending'
    }]);
    if (error) showToast(error.message);
    else showToast('Orden creada. Sube el comprobante.');
    renderView('dashboard');
  }

  window.uploadProofPrompt = async (orderId) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*,application/pdf';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const fakeUrl = URL.createObjectURL(file);
      const { error } = await supabase.from('orders').update({ payment_proof_url: fakeUrl }).eq('id', orderId);
      if (error) showToast(error.message);
      else showToast('Comprobante subido (simulado)');
      renderView('dashboard');
    };
    input.click();
  };

  async function renderView(viewName) {
    const container = document.getElementById('appRoot');
    if (viewName === 'landing') {
      container.innerHTML = `<div class="glass-card" style="text-align:center"><h1 class="neon-text">⚡ StarPage VE</h1><p>Intercambio de monedas digitales (PayPal, Zinli, USDT) a Bolívares vía Pago Móvil o Transferencia.</p><p>Seguro, rápido y con soporte 24/7.</p><button class="btn-neon" data-view="register">Crear cuenta ahora</button></div>`;
    } else if (viewName === 'register') {
      container.innerHTML = `<div class="glass-card" style="max-width:600px;margin:auto"><h2>Registro completo</h2><form id="registerForm"><input type="text" id="reg_name" placeholder="Nombre completo" required><input type="text" id="reg_cedula" placeholder="Cédula" required><input type="email" id="reg_email" placeholder="Email" required><input type="tel" id="reg_phone" placeholder="Teléfono"><input type="text" id="reg_address" placeholder="Dirección"><input type="password" id="reg_password" placeholder="Contraseña" required><input type="text" id="reg_bank" placeholder="Banco"><input type="text" id="reg_account" placeholder="Número de cuenta"><input type="text" id="reg_pagomovil" placeholder="Teléfono Pago Móvil"><button type="submit" class="btn-neon">Registrarme</button></form><p>¿Ya tienes cuenta? <a href="#" data-view="login">Inicia sesión</a></p></div>`;
      document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
    } else if (viewName === 'login') {
      container.innerHTML = `<div class="glass-card" style="max-width:450px;margin:auto"><h2>Acceso</h2><form id="loginForm"><input type="email" id="login_email" placeholder="Email" required><input type="password" id="login_password" placeholder="Contraseña" required><button type="submit" class="btn-neon">Entrar</button></form><p>¿Sin cuenta? <a href="#" data-view="register">Regístrate</a></p></div>`;
      document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
    } else if (viewName === 'dashboard') {
      if (!currentUser) { renderView('landing'); return; }
      const { data: userOrders } = await supabase.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
      container.innerHTML = `<div class="dashboard-grid"><div class="glass-card"><h2>💰 Calculadora de cambio</h2><label>Monto en USD: <input type="number" id="calcUsd" value="100"></label><p>Tasa actual: ${settings.rate_usd_to_bs.toLocaleString()} Bs/USD</p><p>Comisión: ${settings.commission_percent}%</p><p><strong>Recibirás: <span id="calcResult">0</span> Bs</strong></p><hr><h3>Crear nueva orden</h3><form id="createOrderForm"><select id="orderSource"><option>PayPal</option><option>Zinli</option><option>USDT</option></select><input type="number" id="orderAmount" placeholder="Monto USD" required><input type="text" id="orderDestination" placeholder="Cuenta destino (Pago Móvil o Transferencia)" required><button type="submit" class="btn-neon">Generar orden</button></form><div id="orderResult"></div></div><div class="glass-card"><h3>📋 Mis órdenes</h3><div id="myOrdersList">${userOrders.map(o => `<div class="order-item"><strong>ID:</strong> ${o.id}<br><strong>Monto:</strong> $${o.amount_usd}<br><strong>Neto Bs:</strong> ${o.net_bs.toLocaleString()}<br><strong>Estado:</strong> <span class="status-${o.status}">${o.status}</span><br>${o.payment_proof_url ? `<a href="${o.payment_proof_url}" target="_blank">Ver comprobante</a>` : `<button class="btn-outline" onclick="uploadProofPrompt('${o.id}')">Subir comprobante</button>`}</div>`).join('') || '<p>No hay órdenes</p>'}</div></div></div>`;
      const calcInput = document.getElementById('calcUsd');
      if (calcInput) {
        const updateCalc = () => {
          const usd = parseFloat(calcInput.value) || 0;
          const gross = usd * settings.rate_usd_to_bs;
          const net = gross * (1 - settings.commission_percent / 100);
          document.getElementById('calcResult').innerText = net.toLocaleString();
        };
        calcInput.addEventListener('input', updateCalc);
        updateCalc();
      }
      document.getElementById('createOrderForm')?.addEventListener('submit', createOrder);
    } else if (viewName === 'admin') {
      if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'founder')) { renderView('dashboard'); return; }
      container.innerHTML = `<div class="glass-card"><h2>Panel de Administración</h2><div style="display:flex;gap:20px;flex-wrap:wrap;"><button id="adminShowOrdersBtn" class="btn-outline">Órdenes</button><button id="adminShowUsersBtn" class="btn-outline">Usuarios</button><button id="adminShowSettingsBtn" class="btn-outline">Ajustes</button></div><div id="adminContent"></div></div>`;
      document.getElementById('adminShowOrdersBtn')?.addEventListener('click', showAdminOrders);
      document.getElementById('adminShowUsersBtn')?.addEventListener('click', showAdminUsers);
      document.getElementById('adminShowSettingsBtn')?.addEventListener('click', showAdminSettings);
      showAdminOrders();
    }
  }

  async function showAdminOrders() {
    const { data } = await supabase.from('orders').select('*, users(full_name, email)').order('created_at', { ascending: false });
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Todas las órdenes</h3>${data.map(o => `<div class="order-item"><b>${o.id}</b> - Usuario: ${o.users?.full_name || '?'}<br>Monto: $${o.amount_usd} → ${o.net_bs.toLocaleString()} Bs<br>Estado: ${o.status}<br><select id="statusSelect-${o.id}"><option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='processing'?'selected':''}>processing</option><option ${o.status==='completed'?'selected':''}>completed</option><option ${o.status==='cancelled'?'selected':''}>cancelled</option></select><button onclick="updateOrderStatus('${o.id}')">Actualizar</button></div>`).join('')}`;
    window.updateOrderStatus = async (orderId) => {
      const newStatus = document.getElementById(`statusSelect-${orderId}`).value;
      await supabase.from('orders').update({ status: newStatus }).eq('id', orderId);
      showToast('Estado actualizado');
      showAdminOrders();
    };
  }

  async function showAdminUsers() {
    const { data } = await supabase.from('users').select('*');
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Usuarios</h3>${data.map(u => `<div class="order-item"><b>${u.full_name}</b> (${u.email}) - KYC: ${u.kyc_status}<br><button onclick="verifyKYC('${u.id}')">Aprobar KYC</button></div>`).join('')}`;
    window.verifyKYC = async (userId) => { await supabase.from('users').update({ kyc_status: 'verified' }).eq('id', userId); showToast('KYC aprobado'); showAdminUsers(); };
  }

  async function showAdminSettings() {
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Ajustes de tasa y comisión</h3><label>Tasa (Bs/USD): <input type="number" id="adminRate" value="${settings.rate_usd_to_bs}"></label><label>Comisión (%): <input type="number" id="adminCommission" value="${settings.commission_percent}" step="0.5"></label><button id="saveSettingsBtn" class="btn-neon">Guardar cambios</button>`;
    document.getElementById('saveSettingsBtn')?.addEventListener('click', async () => {
      const newRate = parseFloat(document.getElementById('adminRate').value);
      const newComm = parseFloat(document.getElementById('adminCommission').value);
      await supabase.from('settings').insert([{ rate_usd_to_bs: newRate, commission_percent: newComm }]);
      await loadSettings();
      showToast('Tasa y comisión actualizadas');
      renderView('admin');
    });
  }

  function updateNavButtons() {
    const isLogged = !!currentUser;
    document.querySelectorAll('[data-view="register"], [data-view="login"]').forEach(btn => btn.style.display = isLogged ? 'none' : 'inline-block');
    document.getElementById('dashboardNavBtn').style.display = isLogged ? 'inline-block' : 'none';
    document.getElementById('adminNavBtn').style.display = (isLogged && (currentUser?.role === 'admin' || currentUser?.role === 'founder')) ? 'inline-block' : 'none';
    document.getElementById('logoutBtn').style.display = isLogged ? 'inline-block' : 'none';
  }

  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-view]');
    if (target) { e.preventDefault(); renderView(target.getAttribute('data-view')); }
    if (e.target.id === 'logoutBtn') logout();
  });

  // Chat en vivo
  async function loadChat() {
    const { data } = await supabase.from('chat_messages').select('*, users(full_name)').order('created_at', { ascending: true });
    const container = document.getElementById('chatMessages');
    if (container && data) container.innerHTML = data.map(m => `<div><strong>${m.is_admin ? '🤖 Soporte' : (m.users?.full_name || 'Usuario')}:</strong> ${m.message}</div>`).join('');
  }
  document.getElementById('chatToggleBtn')?.addEventListener('click', () => {
    const panel = document.getElementById('chatPanel');
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    loadChat();
  });
  document.getElementById('chatSendBtn')?.addEventListener('click', async () => {
    const input = document.getElementById('chatInput');
    if (!input.value.trim() || !currentUser) return showToast('Inicia sesión para chatear');
    await supabase.from('chat_messages').insert([{ user_id: currentUser.id, message: input.value, is_admin: false }]);
    input.value = '';
    loadChat();
  });

  loadSettings();
  renderView('landing');
  if (currentUser) updateNavButtons();
</script>
</body>
</html>
