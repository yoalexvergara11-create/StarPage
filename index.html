<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Registro KYC Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos mejorados */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b10;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        .bg-glow {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(147,51,234,0.4) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: float 12s infinite alternate;
            z-index: -1;
        }
        .glow-2 {
            background: radial-gradient(circle, rgba(192,132,252,0.3) 0%, rgba(0,0,0,0) 70%);
            top: 20%;
            right: 5%;
            animation-delay: -6s;
        }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(50px,30px) scale(1.1); }
        }
        .container {
            background: rgba(17,17,17,0.9);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 32px;
            border: 1px solid rgba(192,132,252,0.3);
            width: 100%;
            max-width: 450px;
            margin: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-group i.icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #c084fc;
            font-size: 1.1rem;
        }
        input, select {
            width: 100%;
            padding: 0.9rem 0.9rem 0.9rem 2.8rem;
            background: #1a1a24;
            border: 1px solid #2e2e3a;
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #9333ea;
            box-shadow: 0 0 0 2px rgba(147,51,234,0.3);
        }
        .phone-row {
            display: flex;
            gap: 0.75rem;
        }
        .phone-row select {
            width: 35%;
            padding-left: 0.8rem;
        }
        .phone-row input {
            width: 65%;
            padding-left: 0.8rem;
        }
        .eye-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #c084fc; }
        .file-box {
            background: #1a1a24;
            border: 2px dashed #444;
            border-radius: 14px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1.25rem;
        }
        .file-box:hover {
            border-color: #c084fc;
            background: #232330;
        }
        .file-box i {
            font-size: 1.5rem;
            color: #4ade80;
            display: block;
            margin-bottom: 0.5rem;
        }
        .btn-grad {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #9333ea, #4ade80);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-grad:active { transform: scale(0.98); }
        .btn-grad:disabled { opacity: 0.6; cursor: not-allowed; }
        .switch-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.85rem;
        }
        .switch-link span {
            color: #4ade80;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }
        .hidden { display: none !important; }
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11,11,16,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(147,51,234,0.2);
            border-top: 3px solid #9333ea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg-error {
            background: rgba(239,68,68,0.2);
            border-left: 3px solid #ef4444;
            padding: 0.75rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow glow-2"></div>

    <div class="container">
        <div id="loader">
            <div class="spinner"></div>
            <p>Cargando StarPage...</p>
        </div>

        <div id="log-form">
            <h2>🔐 Acceso Clientes</h2>
            <div class="input-group">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="email" id="l-email" placeholder="Correo electrónico">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="l-pass" placeholder="Contraseña">
                <i class="fa-solid fa-eye eye-btn" onclick="togglePass('l-pass')"></i>
            </div>
            <button class="btn-grad" onclick="handleAuth('login')">Iniciar Sesión</button>
            <p class="switch-link">¿Sin cuenta? <span onclick="toggleView()">Crea una ahora</span></p>
        </div>

        <div id="reg-form" class="hidden">
            <h2>✨ Únete a StarPage</h2>
            <div class="input-group">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="email" id="r-email" placeholder="Correo electrónico">
            </div>
            <div class="phone-row input-group">
                <select id="r-prefix">
                    <option value="+58">🇻🇪 +58</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+57">🇨🇴 +57</option>
                </select>
                <input type="tel" id="r-phone" placeholder="Número WhatsApp">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-address-card icon"></i>
                <input type="text" id="r-dni" placeholder="Cédula / Pasaporte">
            </div>
            <div class="file-box" onclick="document.getElementById('r-file').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span id="file-name">Subir foto de identidad (KYC)</span>
                <input type="file" id="r-file" class="hidden" accept="image/*" onchange="updateFileName(this)">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="r-pass" placeholder="Contraseña segura">
                <i class="fa-solid fa-eye eye-btn" onclick="togglePass('r-pass')"></i>
            </div>
            <button class="btn-grad" id="btn-reg" onclick="handleAuth('signup')">Registrarme</button>
            <p class="switch-link">¿Ya tienes cuenta? <span onclick="toggleView()">Inicia sesión</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const loader = document.getElementById('loader');
        const regForm = document.getElementById('reg-form');
        const logForm = document.getElementById('log-form');

        setTimeout(() => { if(loader) loader.classList.add('hidden'); }, 2000);

        onAuthStateChanged(auth, (user) => {
            if(loader) loader.classList.add('hidden');
            if(user) {
                const email = user.email.toLowerCase();
                window.location.href = email === "yoalexvergara11@gmail.com" ? "dashboard.html" : "vender.html";
            }
        });

        window.toggleView = () => {
            regForm.classList.toggle('hidden');
            logForm.classList.toggle('hidden');
        };

        window.togglePass = (id) => {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        };

        window.updateFileName = (input) => {
            if(input.files && input.files[0]) {
                document.getElementById('file-name').innerText = "✅ " + input.files[0].name;
            }
        };

        window.handleAuth = async (mode) => {
            if(mode === 'signup') {
                const email = document.getElementById('r-email').value.trim();
                const pass = document.getElementById('r-pass').value;
                const dni = document.getElementById('r-dni').value.trim();
                const prefix = document.getElementById('r-prefix').value;
                const phone = prefix + document.getElementById('r-phone').value.trim();
                const file = document.getElementById('r-file').files[0];

                if(!email || !pass || !dni || !file) {
                    alert("❌ Completa todos los campos y sube tu documento.");
                    return;
                }

                const btn = document.getElementById('btn-reg');
                btn.disabled = true;
                btn.innerText = "Registrando...";

                try {
                    // 1. Crear usuario en Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    const user = userCredential.user;

                    // 2. Subir imagen a Storage
                    const storageRef = ref(storage, `kyc/${user.uid}`);
                    await uploadBytes(storageRef, file);
                    const photoURL = await getDownloadURL(storageRef);

                    // 3. Guardar datos en Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        email: email.toLowerCase(),
                        phone: phone,
                        dni: dni,
                        photoURL: photoURL,
                        role: "client",
                        status: "pending",
                        createdAt: new Date()
                    });

                    alert("✅ Registro exitoso. Serás redirigido.");
                    window.location.href = "vender.html";
                } catch (error) {
                    console.error("Error en registro:", error);
                    alert("❌ Error: " + error.message);
                    btn.disabled = false;
                    btn.innerText = "Crear mi Cuenta";
                }
            } else {
                // Login
                const email = document.getElementById('l-email').value.trim().toLowerCase();
                const pass = document.getElementById('l-pass').value;
                if(!email || !pass) return alert("Ingresa tu correo y contraseña");

                try {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    const destino = res.user.email.toLowerCase() === "yoalexvergara11@gmail.com" ? "dashboard.html" : "vender.html";
                    window.location.href = destino;
                } catch(e) {
                    alert("❌ Acceso denegado. Verifica tus datos.");
                }
            }
        };
    </script>
</body>
</html>
