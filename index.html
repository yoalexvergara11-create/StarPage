<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>StarPage VE · Intercambio Real</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: radial-gradient(circle at 10% 20%, #03050b, #000000); color: #eef5ff; line-height: 1.5; }
    .glass-card { background: rgba(8,18,28,0.75); backdrop-filter: blur(12px); border: 1px solid rgba(0,240,255,0.25); border-radius: 28px; padding: 1.5rem; margin-bottom: 1rem; }
    .neon-text { color: #00f0ff; text-shadow: 0 0 5px #00f0ff, 0 0 12px #ff6bd6; }
    .btn-neon { background: linear-gradient(95deg, #00c3ff, #ff6bd6); border: none; color: #010101; font-weight: bold; padding: 10px 24px; border-radius: 60px; cursor: pointer; transition: 0.2s; }
    .btn-neon:hover { transform: scale(1.02); opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid #00f0ff; color: #00f0ff; border-radius: 40px; padding: 8px 18px; cursor: pointer; transition: 0.2s; }
    .btn-outline:hover { background: #00f0ff20; }
    input, select { background: #0b1018; border: 1px solid #2a3a48; padding: 12px; border-radius: 20px; color: white; width: 100%; margin: 6px 0 12px; outline: none; }
    input:focus { border-color: #00f0ff; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 18px 5%; border-bottom: 1px solid rgba(0,240,255,0.3); flex-wrap: wrap; gap: 15px; }
    .logo { font-size: 1.7rem; font-weight: 800; }
    .badge-ve { background: #ff6bd6; color: black; font-size: 0.7rem; border-radius: 30px; padding: 2px 10px; margin-left: 8px; }
    .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .main-container { max-width: 1400px; margin: 20px auto; padding: 0 20px 40px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .order-item { background: #0f1722; border-left: 5px solid #00f0ff; border-radius: 20px; padding: 16px; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 30px; left: 20px; background: #1e2a3a; border-left: 6px solid #00f0ff; padding: 12px 20px; border-radius: 16px; z-index: 2000; animation: fadein 0.3s; }
    @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .chat-widget { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
    .chat-button { background: #ff6bd6; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; box-shadow: 0 0 20px #ff6bd6; }
    .chat-panel { position: fixed; bottom: 90px; right: 24px; width: 320px; height: 450px; background: #0a0f1c; border-radius: 24px; border: 1px solid cyan; display: none; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 12px; background: #0f1722; border-bottom: 1px solid cyan; font-weight: bold; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
    .chat-input-area { display: flex; border-top: 1px solid #2a3a48; }
    .chat-input-area input { flex: 1; border: none; border-radius: 0; margin: 0; }
    .chat-input-area button { background: #00f0ff; border: none; padding: 12px; cursor: pointer; color: black; }
    footer { text-align: center; padding: 28px 20px; border-top: 1px solid rgba(0,240,255,0.15); margin-top: 40px; font-size: 13px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
    .status-pending { color: #f0b400; }
    .status-processing { color: #00aaff; }
    .status-completed { color: #00cc88; }
    .status-cancelled { color: #ff4466; }
    a { color: #00f0ff; cursor: pointer; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-rocket" style="color:#00f0ff"></i> StarPage<span class="badge-ve">VE</span></div>
  <div class="nav-buttons" id="navButtons">
    <button class="btn-outline" data-view="landing">Inicio</button>
    <button class="btn-outline" data-view="register">Registro</button>
    <button class="btn-outline" data-view="login">Acceso</button>
    <button class="btn-outline" data-view="dashboard" style="display:none;" id="dashboardNavBtn">Dashboard</button>
    <button class="btn-outline" data-view="admin" style="display:none;" id="adminNavBtn">Admin</button>
    <button class="btn-outline" id="logoutBtn" style="display:none;">Salir</button>
  </div>
</header>

<main class="main-container" id="appRoot"></main>

<footer>© StarPage - Todos los derechos reservados · <span id="rateFooter">Cargando tasas...</span></footer>

<div class="chat-widget">
  <div class="chat-button" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></div>
  <div class="chat-panel glass-card" id="chatPanel">
    <div class="chat-header">💬 Soporte en vivo</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Escribe tu mensaje...">
      <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
  (function() {
    const SUPABASE_URL = 'https://drdlldpcyeaavjdqrzec.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_38DviMPudTo2uM1QdzCh5g_7B1cyEmx';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currencies = [];

    function showToast(msg, isError = false) {
      let t = document.createElement('div');
      t.className = 'toast';
      t.style.borderLeftColor = isError ? '#ff4466' : '#00f0ff';
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function loadCurrencies() {
      const { data, error } = await supabaseClient.from('currencies').select('*');
      if (error) {
        console.error(error);
        showToast('Error al cargar tasas: ' + error.message, true);
        return [];
      }
      currencies = data;
      updateFooterRates();
      return data;
    }

    function updateFooterRates() {
      const footerSpan = document.getElementById('rateFooter');
      if (footerSpan && currencies.length) {
        const paypal = currencies.find(c => c.name === 'PayPal');
        if (paypal) footerSpan.innerText = `Tasa PayPal: ${paypal.rate.toLocaleString()} Bs/USD · Comisión ${paypal.commission}%`;
      }
    }

    async function fetchUserProfile(userId) {
      const { data, error } = await supabaseClient.from('users').select('*').eq('id', userId).single();
      if (error) throw error;
      return data;
    }

    function updateNavButtons() {
      const isLogged = !!currentUser;
      document.querySelectorAll('[data-view="register"], [data-view="login"]').forEach(btn => btn.style.display = isLogged ? 'none' : 'inline-block');
      const dashBtn = document.getElementById('dashboardNavBtn');
      if (dashBtn) dashBtn.style.display = isLogged ? 'inline-block' : 'none';
      const adminBtn = document.getElementById('adminNavBtn');
      if (adminBtn) adminBtn.style.display = (isLogged && (currentUser?.role === 'admin' || currentUser?.role === 'founder')) ? 'inline-block' : 'none';
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) logoutBtn.style.display = isLogged ? 'inline-block' : 'none';
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      currentUser = null;
      updateNavButtons();
      renderView('landing');
      showToast('Sesión cerrada');
    }

    // Vistas
    function renderLanding() {
      return `<div class="glass-card" style="text-align:center">
        <h1 class="neon-text">⚡ StarPage VE</h1>
        <p>Intercambio de monedas digitales a Bolívares vía Pago Móvil o Transferencia.</p>
        <button class="btn-neon" data-view="register">Crear cuenta ahora</button>
      </div>`;
    }

    function renderRegister() {
      return `<div class="glass-card" style="max-width:600px;margin:auto">
        <h2>Registro completo</h2>
        <form id="registerForm">
          <input type="text" id="reg_name" placeholder="Nombre completo" required>
          <input type="text" id="reg_cedula" placeholder="Cédula" required>
          <input type="email" id="reg_email" placeholder="Email" required>
          <input type="tel" id="reg_phone" placeholder="Teléfono">
          <input type="text" id="reg_address" placeholder="Dirección">
          <input type="password" id="reg_password" placeholder="Contraseña" required>
          <input type="text" id="reg_bank" placeholder="Banco">
          <input type="text" id="reg_account" placeholder="Número de cuenta">
          <input type="text" id="reg_pagomovil" placeholder="Teléfono Pago Móvil">
          <button type="submit" class="btn-neon">Registrarme</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="#" data-view="login">Inicia sesión</a></p>
      </div>`;
    }

    function renderLogin() {
      return `<div class="glass-card" style="max-width:450px;margin:auto">
        <h2>Acceso</h2>
        <form id="loginForm">
          <input type="email" id="login_email" placeholder="Email" required>
          <input type="password" id="login_password" placeholder="Contraseña" required>
          <button type="submit" class="btn-neon">Entrar</button>
        </form>
        <p>¿Sin cuenta? <a href="#" data-view="register">Regístrate</a></p>
      </div>`;
    }

    async function renderDashboard() {
      if (!currentUser) return '<p>Debes iniciar sesión.</p>';
      const { data: userOrders, error } = await supabaseClient.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
      if (error) console.error(error);
      
      let currencyOptions = '';
      currencies.forEach(c => {
        currencyOptions += `<option value="${c.name}" data-rate="${c.rate}" data-comm="${c.commission}" data-dest="${c.destination_account.replace(/"/g, '&quot;')}">${c.name} (Tasa: ${c.rate.toLocaleString()} Bs/USD - Comisión ${c.commission}%)</option>`;
      });
      
      return `<div class="dashboard-grid">
        <div class="glass-card">
          <h2>💰 Calculadora de cambio</h2>
          <label>Moneda a vender:</label>
          <select id="calcCurrency">${currencyOptions}</select>
          <label>Monto en USD (o equivalente):</label>
          <input type="number" id="calcUsd" value="100">
          <p><strong>Debes enviar:</strong> <span id="calcSend">0</span> USD</p>
          <p><strong>Recibirás (Bs):</strong> <span id="calcReceive">0</span> Bs</p>
          <p><strong>Cuenta destino para este pago:</strong> <span id="destAccount">${currencies[0]?.destination_account || ''}</span></p>
          <hr>
          <h3>Crear nueva orden</h3>
          <form id="createOrderForm">
            <select id="orderSource">${currencyOptions}</select>
            <input type="number" id="orderAmount" placeholder="Monto USD" required>
            <button type="submit" class="btn-neon">Generar orden</button>
          </form>
        </div>
        <div class="glass-card">
          <h3>📋 Mis órdenes</h3>
          <div id="myOrdersList">
            ${userOrders && userOrders.length ? userOrders.map(o => `
              <div class="order-item">
                <strong>ID:</strong> ${o.id}<br>
                <strong>Monto:</strong> $${o.amount_usd}<br>
                <strong>Neto Bs:</strong> ${o.net_bs.toLocaleString()}<br>
                <strong>Estado:</strong> <span class="status-${o.status}">${o.status}</span><br>
                ${!o.proof_url ? `<button class="btn-outline" onclick="window.uploadProof(${o.id})">Subir comprobante</button>` : `<a href="${o.proof_url}" target="_blank">Ver comprobante</a>`}
              </div>
            `).join('') : '<p>No hay órdenes</p>'}
          </div>
        </div>
      </div>`;
    }

    async function renderAdmin() {
      if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'founder')) return '<p>Acceso denegado.</p>';
      return `<div class="glass-card">
        <h2>Panel de Administración</h2>
        <div style="display:flex;gap:20px;flex-wrap:wrap;">
          <button id="adminShowOrdersBtn" class="btn-outline">Órdenes</button>
          <button id="adminShowUsersBtn" class="btn-outline">Usuarios</button>
          <button id="adminShowCurrenciesBtn" class="btn-outline">Tasas y Cuentas</button>
          ${currentUser.role === 'founder' ? '<button id="adminManageAdminsBtn" class="btn-outline">Gestionar Admins</button>' : ''}
        </div>
        <div id="adminContent"></div>
      </div>`;
    }

    window.showAdminOrders = async function() {
      const container = document.getElementById('adminContent');
      if (!container) return;
      const { data: orders, error } = await supabaseClient.from('orders').select('*, users(email)');
      if (error) return showToast('Error al cargar órdenes');
      container.innerHTML = `<h3>📦 Órdenes</h3>
        ${orders.map(o => `<div class="order-item">
          <b>#${o.id}</b> - Usuario: ${o.users?.email || '?'}<br>
          Monto: $${o.amount_usd} → ${o.net_bs.toLocaleString()} Bs<br>
          Estado: ${o.status}<br>
          <select id="status-${o.id}">
            <option ${o.status==='pending'?'selected':''}>pending</option>
            <option ${o.status==='processing'?'selected':''}>processing</option>
            <option ${o.status==='completed'?'selected':''}>completed</option>
            <option ${o.status==='cancelled'?'selected':''}>cancelled</option>
          </select>
          <button class="btn-neon" onclick="window.updateOrderStatus(${o.id})">Actualizar</button>
        </div>`).join('')}`;
    };

    window.updateOrderStatus = async function(orderId) {
      const newStatus = document.getElementById(`status-${orderId}`).value;
      const { error } = await supabaseClient.from('orders').update({ status: newStatus }).eq('id', orderId);
      if (error) showToast('Error al actualizar');
      else showToast('Estado actualizado');
      window.showAdminOrders();
    };

    window.showAdminUsers = async function() {
      const container = document.getElementById('adminContent');
      const { data: users, error } = await supabaseClient.from('users').select('*');
      if (error) return;
      container.innerHTML = `<h3>👥 Usuarios</h3>
        ${users.map(u => `<div class="order-item">
          <b>${u.full_name}</b> (${u.email}) - KYC: ${u.kyc_status}<br>
          <button class="btn-outline" onclick="window.approveKYC('${u.id}')">Aprobar KYC</button>
        </div>`).join('')}`;
    };

    window.approveKYC = async function(userId) {
      const { error } = await supabaseClient.from('users').update({ kyc_status: 'verified' }).eq('id', userId);
      if (error) showToast('Error');
      else showToast('KYC aprobado');
      window.showAdminUsers();
    };

    window.showAdminCurrencies = async function() {
      const container = document.getElementById('adminContent');
      await loadCurrencies();
      container.innerHTML = `<h3>⚙️ Tasas y Cuentas Destino</h3>
        ${currencies.map(c => `
          <div class="order-item">
            <b>${c.name}</b><br>
            Tasa (Bs/USD): <input id="rate-${c.id}" value="${c.rate}"><br>
            Comisión (%): <input id="comm-${c.id}" value="${c.commission}"><br>
            Cuenta destino: <textarea id="dest-${c.id}" rows="2">${c.destination_account}</textarea><br>
            <button class="btn-neon" onclick="window.updateCurrency(${c.id})">Guardar cambios</button>
          </div>
        `).join('')}`;
    };

    window.updateCurrency = async function(currencyId) {
      const newRate = parseFloat(document.getElementById(`rate-${currencyId}`).value);
      const newComm = parseFloat(document.getElementById(`comm-${currencyId}`).value);
      const newDest = document.getElementById(`dest-${currencyId}`).value;
      const { error } = await supabaseClient.from('currencies').update({ rate: newRate, commission: newComm, destination_account: newDest }).eq('id', currencyId);
      if (error) showToast('Error al guardar');
      else {
        showToast('Actualizado correctamente');
        await loadCurrencies();
        window.showAdminCurrencies();
      }
    };

    window.showAdminManageAdmins = async function() {
      const container = document.getElementById('adminContent');
      const { data: admins, error } = await supabaseClient.from('users').select('*').in('role', ['admin', 'founder']);
      if (error) return;
      container.innerHTML = `<h3>🔐 Administradores</h3>
        <div>${admins.map(a => `<div class="order-item">${a.full_name} - ${a.email} (${a.role}) <button class="btn-outline" onclick="window.deleteAdmin('${a.id}')">Eliminar</button></div>`).join('')}</div>
        <hr><h4>Crear nuevo admin</h4>
        <input id="newAdminName" placeholder="Nombre completo">
        <input id="newAdminEmail" placeholder="Email">
        <input id="newAdminPass" type="password" placeholder="Contraseña">
        <button class="btn-neon" id="createAdminBtn">Crear Admin</button>`;
      document.getElementById('createAdminBtn').addEventListener('click', async () => {
        const name = document.getElementById('newAdminName').value.trim();
        const email = document.getElementById('newAdminEmail').value.trim();
        const pass = document.getElementById('newAdminPass').value;
        if (!name || !email || !pass) return showToast('Complete todos los campos');
        const { data: authData, error: signUpError } = await supabaseClient.auth.signUp({ email, password: pass });
        if (signUpError) return showToast(signUpError.message);
        const { error: profileError } = await supabaseClient.from('users').insert({
          id: authData.user.id,
          full_name: name,
          email: email,
          role: 'admin',
          kyc_status: 'verified'
        });
        if (profileError) showToast(profileError.message);
        else showToast('Admin creado');
        window.showAdminManageAdmins();
      });
    };

    window.deleteAdmin = async function(userId) {
      const { error } = await supabaseClient.from('users').delete().eq('id', userId);
      if (error) showToast('Error al eliminar');
      else showToast('Admin eliminado');
      window.showAdminManageAdmins();
    };

    // Handlers
    async function handleRegister(e) {
      e.preventDefault();
      const email = document.getElementById('reg_email').value.trim();
      const password = document.getElementById('reg_password').value;
      const full_name = document.getElementById('reg_name').value.trim();
      const cedula = document.getElementById('reg_cedula').value.trim();
      if (!email || !password || !full_name || !cedula) return showToast('Completa los campos obligatorios');
      
      const isFounderEmail = email === 'yoalexvergara11@gmail.com';
      const role = isFounderEmail ? 'founder' : 'user';
      
      const { data: authData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
      if (signUpError) return showToast(signUpError.message);
      
      const { error: profileError } = await supabaseClient.from('users').insert({
        id: authData.user.id,
        full_name,
        cedula,
        email,
        phone: document.getElementById('reg_phone').value,
        address: document.getElementById('reg_address').value,
        bank_name: document.getElementById('reg_bank').value,
        bank_account: document.getElementById('reg_account').value,
        phone_pagomovil: document.getElementById('reg_pagomovil').value,
        role: role,
        kyc_status: 'pending'
      });
      if (profileError) return showToast('Error al crear perfil: ' + profileError.message);
      
      showToast('Registro exitoso. Ahora inicia sesión.');
      renderView('login');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login_email').value.trim();
      const password = document.getElementById('login_password').value;
      
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        console.error('Error de login:', error);
        showToast(`Error: ${error.message}`, true);
        return;
      }
      
      try {
        const profile = await fetchUserProfile(data.user.id);
        currentUser = { ...data.user, ...profile };
        updateNavButtons();
        renderView('dashboard');
        showToast(`Bienvenido ${currentUser.full_name}`);
      } catch (err) {
        showToast('Usuario autenticado pero sin perfil. Contacta soporte.', true);
        console.error(err);
      }
    }

    async function createOrder(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('orderAmount').value);
      const selectedOption = document.getElementById('orderSource').selectedOptions[0];
      const currencyName = selectedOption.value;
      const currency = currencies.find(c => c.name === currencyName);
      if (!currency) return showToast('Moneda no válida');
      if (isNaN(amount) || amount <= 0) return showToast('Monto inválido');
      
      const gross = amount * currency.rate;
      const net = gross * (1 - currency.commission / 100);
      const { error } = await supabaseClient.from('orders').insert({
        user_id: currentUser.id,
        amount_usd: amount,
        net_bs: net,
        source_currency: currencyName,
        destination_account: currency.destination_account,
        rate_applied: currency.rate,
        commission_applied: currency.commission,
        status: 'pending'
      });
      if (error) showToast('Error al crear orden: ' + error.message);
      else showToast('Orden creada correctamente');
      renderView('dashboard');
    }

    window.uploadProof = async function(orderId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fileExt = file.name.split('.').pop();
        const fileName = `proof_${orderId}_${Date.now()}.${fileExt}`;
        const { data, error } = await supabaseClient.storage.from('proofs').upload(fileName, file);
        if (error) return showToast('Error al subir: ' + error.message);
        const { data: publicUrlData } = supabaseClient.storage.from('proofs').getPublicUrl(fileName);
        const { error: updateError } = await supabaseClient.from('orders').update({ proof_url: publicUrlData.publicUrl }).eq('id', orderId);
        if (updateError) showToast('Error al guardar URL');
        else showToast('Comprobante subido correctamente');
        renderView('dashboard');
      };
      input.click();
    };

    // Chat
    async function loadChatMessages() {
      const { data, error } = await supabaseClient.from('chat_messages').select('*, users(full_name)').order('created_at', { ascending: true });
      if (error) return;
      const chatContainer = document.getElementById('chatMessages');
      if (!chatContainer) return;
      chatContainer.innerHTML = data.map(m => `<div><strong>${m.is_admin ? '👑 Soporte' : (m.users?.full_name || 'Usuario')}:</strong> ${m.message}</div>`).join('');
    }

    async function sendChatMessage() {
      const input = document.getElementById('chatInput');
      if (!input.value.trim()) return showToast('Escribe un mensaje');
      if (!currentUser) return showToast('Inicia sesión para chatear');
      const { error } = await supabaseClient.from('chat_messages').insert({
        user_id: currentUser.id,
        message: input.value,
        is_admin: (currentUser.role === 'admin' || currentUser.role === 'founder')
      });
      if (error) showToast('Error al enviar');
      else {
        input.value = '';
        loadChatMessages();
      }
    }

    const views = {
      landing: renderLanding,
      register: renderRegister,
      login: renderLogin,
      dashboard: renderDashboard,
      admin: renderAdmin
    };

    async function renderView(viewName) {
      const container = document.getElementById('appRoot');
      if (!container) return;
      const renderFn = views[viewName];
      if (renderFn) container.innerHTML = await renderFn();
      else container.innerHTML = renderLanding();

      if (viewName === 'register') {
        document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
      }
      if (viewName === 'login') {
        document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
      }
      if (viewName === 'dashboard') {
        const calcUsd = document.getElementById('calcUsd');
        const calcCurrency = document.getElementById('calcCurrency');
        const updateCalc = () => {
          const usd = parseFloat(calcUsd.value) || 0;
          const selected = calcCurrency.selectedOptions[0];
          const rate = parseFloat(selected.getAttribute('data-rate'));
          const comm = parseFloat(selected.getAttribute('data-comm'));
          const net = usd * rate * (1 - comm / 100);
          document.getElementById('calcSend').innerText = usd;
          document.getElementById('calcReceive').innerText = net.toLocaleString();
          document.getElementById('destAccount').innerText = selected.getAttribute('data-dest');
        };
        calcUsd.addEventListener('input', updateCalc);
        calcCurrency.addEventListener('change', updateCalc);
        updateCalc();
        document.getElementById('createOrderForm')?.addEventListener('submit', createOrder);
      }
      if (viewName === 'admin') {
        document.getElementById('adminShowOrdersBtn')?.addEventListener('click', window.showAdminOrders);
        document.getElementById('adminShowUsersBtn')?.addEventListener('click', window.showAdminUsers);
        document.getElementById('adminShowCurrenciesBtn')?.addEventListener('click', window.showAdminCurrencies);
        document.getElementById('adminManageAdminsBtn')?.addEventListener('click', window.showAdminManageAdmins);
        window.showAdminOrders();
      }
    }

    document.addEventListener('click', (e) => {
      const target = e.target.closest('[data-view]');
      if (target) {
        e.preventDefault();
        const view = target.getAttribute('data-view');
        if (view === 'logout') logout();
        else renderView(view);
      }
      if (e.target.id === 'logoutBtn') logout();
    });

    const chatToggle = document.getElementById('chatToggleBtn');
    const chatPanel = document.getElementById('chatPanel');
    chatToggle?.addEventListener('click', () => {
      if (chatPanel) {
        chatPanel.style.display = chatPanel.style.display === 'flex' ? 'none' : 'flex';
        loadChatMessages();
      }
    });
    document.getElementById('chatSendBtn')?.addEventListener('click', sendChatMessage);

    (async function init() {
      await loadCurrencies();
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session?.user) {
        try {
          const profile = await fetchUserProfile(session.user.id);
          currentUser = { ...session.user, ...profile };
          updateNavButtons();
          renderView('dashboard');
        } catch (e) {
          console.error(e);
          renderView('landing');
        }
      } else {
        renderView('landing');
      }
    })();
  })();
</script>
</body>
</html>
