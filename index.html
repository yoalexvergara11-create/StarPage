<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarPage VE · Intercambio Real</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: radial-gradient(circle at 10% 20%, #03050b, #000000); color: #eef5ff; line-height: 1.5; }
    .glass-card { background: rgba(8,18,28,0.75); backdrop-filter: blur(12px); border: 1px solid rgba(0,240,255,0.25); border-radius: 28px; padding: 1.5rem; margin-bottom: 1rem; }
    .neon-text { color: #00f0ff; text-shadow: 0 0 5px #00f0ff, 0 0 12px #ff6bd6; }
    .btn-neon { background: linear-gradient(95deg, #00c3ff, #ff6bd6); border: none; color: #010101; font-weight: bold; padding: 10px 24px; border-radius: 60px; cursor: pointer; transition: 0.2s; }
    .btn-neon:hover { transform: scale(1.02); opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid #00f0ff; color: #00f0ff; border-radius: 40px; padding: 8px 18px; cursor: pointer; transition: 0.2s; }
    .btn-outline:hover { background: #00f0ff20; }
    input, select { background: #0b1018; border: 1px solid #2a3a48; padding: 12px; border-radius: 20px; color: white; width: 100%; margin: 6px 0 12px; outline: none; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 18px 5%; border-bottom: 1px solid rgba(0,240,255,0.3); flex-wrap: wrap; gap: 15px; }
    .logo { font-size: 1.7rem; font-weight: 800; }
    .badge-ve { background: #ff6bd6; color: black; font-size: 0.7rem; border-radius: 30px; padding: 2px 10px; margin-left: 8px; }
    .nav-buttons { display: flex; gap: 12px; }
    .main-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .order-item { background: #0f1722; border-left: 5px solid #00f0ff; border-radius: 20px; padding: 16px; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 30px; left: 20px; background: #1e2a3a; border-left: 6px solid #00f0ff; padding: 12px 20px; border-radius: 16px; z-index: 2000; }
    footer { text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid rgba(0,240,255,0.2); }
    .status-pending { color: #f0b400; }
    .status-completed { color: #00cc88; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <div class="logo"><i class="fas fa-rocket" style="color:#00f0ff"></i> StarPage<span class="badge-ve">VE</span></div>
  <div class="nav-buttons" id="navButtons">
    <button class="btn-outline" data-view="landing">Inicio</button>
    <button class="btn-outline" data-view="register">Registro</button>
    <button class="btn-outline" data-view="login">Acceso</button>
    <button class="btn-outline" data-view="dashboard" style="display:none;" id="dashboardNavBtn">Dashboard</button>
    <button class="btn-outline" data-view="admin" style="display:none;" id="adminNavBtn">Admin</button>
    <button class="btn-outline" id="logoutBtn" style="display:none;">Salir</button>
  </div>
</header>
<main class="main-container" id="appRoot"></main>
<footer>© StarPage · <span id="rateFooter">Cargando...</span></footer>

<script>
  const SUPABASE_URL = 'https://drdlldpcyeaavjdqrzec.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_38DviMPudTo2uM1QdzCh5g_7B1cyEmx';
  const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currencies = [];

  function showToast(msg, isError = false) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.style.borderLeftColor = isError ? '#ff4466' : '#00f0ff';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  async function loadCurrencies() {
    const { data, error } = await supabase.from('platform_settings').select('*').eq('type', 'currency');
    if (error) {
      console.error(error);
      showToast('Error al cargar tasas', true);
      return;
    }
    if (data && data.length) {
      currencies = data.map(c => ({
        code: c.key,
        rate: c.rate_value,
        commission: c.commission_value,
        receiving_account: c.receiving_account
      }));
      document.getElementById('rateFooter').innerHTML = currencies.map(c => `${c.code}: ${c.rate.toLocaleString()} Bs (${c.commission}%)`).join(' · ');
    }
  }

  function renderView(view) {
    const container = document.getElementById('appRoot');
    if (!container) return;
    if (view === 'landing') {
      container.innerHTML = `<div class="glass-card" style="text-align:center"><h1 class="neon-text">⚡ StarPage VE</h1><p>Intercambio de monedas digitales a Bolívares.</p><button class="btn-neon" data-view="register">Crear cuenta</button></div>`;
    } 
    else if (view === 'register') {
      container.innerHTML = `<div class="glass-card" style="max-width:500px;margin:auto"><h2>Registro</h2><form id="registerForm"><input type="text" id="reg_name" placeholder="Nombre completo" required><input type="email" id="reg_email" placeholder="Email" required><input type="password" id="reg_password" placeholder="Contraseña" required><button class="btn-neon" type="submit">Registrarse</button></form><p>¿Ya tienes cuenta? <a href="#" data-view="login">Inicia sesión</a></p></div>`;
      document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('reg_name').value.trim();
        const email = document.getElementById('reg_email').value.trim();
        const pass = document.getElementById('reg_password').value;
        if (!name || !email || !pass) return showToast('Completa todos los campos', true);
        const { error } = await supabase.from('users').insert([{ full_name: name, email, password: pass, role: 'user' }]);
        if (error) return showToast(error.message, true);
        showToast('Registro exitoso. Inicia sesión.');
        renderView('login');
      });
    }
    else if (view === 'login') {
      container.innerHTML = `<div class="glass-card" style="max-width:400px;margin:auto"><h2>Acceso</h2><form id="loginForm"><input type="email" id="login_email" placeholder="Email" required><input type="password" id="login_password" placeholder="Contraseña" required><button class="btn-neon" type="submit">Entrar</button></form><p>¿Sin cuenta? <a href="#" data-view="register">Regístrate</a></p></div>`;
      document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login_email').value.trim();
        const pass = document.getElementById('login_password').value;
        const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password', pass);
        if (error || !data || data.length === 0) return showToast('Email o contraseña incorrectos', true);
        currentUser = data[0];
        sessionStorage.setItem('starpage_user', JSON.stringify(currentUser));
        updateNavButtons();
        renderView('dashboard');
        showToast(`✨ Bienvenido ${currentUser.full_name} ✨`);
      });
    }
    else if (view === 'dashboard') {
      if (!currentUser) return renderView('login');
      const { data: orders } = await supabase.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
      container.innerHTML = `<div class="dashboard-grid">
        <div class="glass-card">
          <h2>💰 Calculadora</h2>
          <label>Moneda: <select id="calcCurrency">${currencies.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}</select></label>
          <label>Monto USD: <input type="number" id="calcAmount" value="100"></label>
          <p><strong>Recibirás: <span id="calcResult">0</span> Bs</strong></p>
          <p>Cuenta para pagar: <strong id="receiveAccount"></strong></p>
          <hr>
          <h3>Crear orden</h3>
          <form id="createOrderForm">
            <select id="orderSource">${currencies.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}</select>
            <input type="number" id="orderAmount" placeholder="Monto USD" required>
            <input type="text" id="orderDestination" placeholder="Tu cuenta destino" required>
            <button class="btn-neon" type="submit">Generar orden</button>
          </form>
        </div>
        <div class="glass-card">
          <h3>📋 Mis órdenes</h3>
          <div id="myOrdersList">${orders?.map(o => `<div class="order-item"><strong>${o.id}</strong> - $${o.amount_usd} → ${Number(o.net_bs).toLocaleString()} Bs<br>Estado: <span class="status-${o.status}">${o.status}</span><br><button class="btn-outline" onclick="uploadProof('${o.id}')">Subir comprobante</button></div>`).join('') || '<p>No hay órdenes</p>'}</div>
        </div>
      </div>`;
      // Calculadora automática
      const calcCurrency = document.getElementById('calcCurrency');
      const calcAmount = document.getElementById('calcAmount');
      const calcResult = document.getElementById('calcResult');
      const receiveAccount = document.getElementById('receiveAccount');
      function updateCalc() {
        const curr = currencies.find(c => c.code === calcCurrency.value);
        if (!curr) return;
        const usd = parseFloat(calcAmount.value) || 0;
        const net = usd * curr.rate * (1 - curr.commission / 100);
        calcResult.innerText = net.toLocaleString(undefined, { maximumFractionDigits: 2 });
        receiveAccount.innerText = curr.receiving_account || 'No especificada';
      }
      calcCurrency.addEventListener('change', updateCalc);
      calcAmount.addEventListener('input', updateCalc);
      updateCalc();
      // Crear orden
      document.getElementById('createOrderForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('orderAmount').value);
        const dest = document.getElementById('orderDestination').value.trim();
        const source = document.getElementById('orderSource').value;
        if (!amount || amount <= 0) return showToast('Monto inválido', true);
        const curr = currencies.find(c => c.code === source);
        const net = amount * curr.rate * (1 - curr.commission / 100);
        const orderId = 'ORD-' + Date.now();
        const { error } = await supabase.from('orders').insert([{ id: orderId, user_id: currentUser.id, amount_usd: amount, net_bs: net, status: 'pending', source_currency: source, destination_account: dest }]);
        if (error) return showToast('Error al crear orden', true);
        showToast('Orden creada');
        renderView('dashboard');
      });
    }
    else if (view === 'admin') {
      if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'founder')) return renderView('dashboard');
      const { data: allOrders } = await supabase.from('orders').select('*, users(full_name)');
      container.innerHTML = `<div class="glass-card">
        <h2>Panel Admin</h2>
        <div><button id="adminOrdersBtn" class="btn-outline">Órdenes</button> <button id="adminRatesBtn" class="btn-outline">Tasas</button></div>
        <div id="adminContent"></div>
      </div>`;
      document.getElementById('adminOrdersBtn')?.addEventListener('click', () => showAdminOrders(allOrders));
      document.getElementById('adminRatesBtn')?.addEventListener('click', showAdminCurrencies);
      showAdminOrders(allOrders);
    }
  }

  async function showAdminOrders(orders) {
    const container = document.getElementById('adminContent');
    if (!container) return;
    container.innerHTML = `<h3>Órdenes</h3>${orders.map(o => `<div class="order-item"><b>${o.id}</b> - ${o.users?.full_name || '?'}<br>Monto: $${o.amount_usd} → ${Number(o.net_bs).toLocaleString()} Bs<br>Estado: ${o.status}<br><select id="status-${o.id}"><option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='processing'?'selected':''}>processing</option><option ${o.status==='completed'?'selected':''}>completed</option></select><button class="btn-neon" onclick="updateOrderStatus('${o.id}')">Actualizar</button></div>`).join('')}`;
  }

  window.updateOrderStatus = async (id) => {
    const newStatus = document.getElementById(`status-${id}`).value;
    await supabase.from('orders').update({ status: newStatus }).eq('id', id);
    showToast('Estado actualizado');
    const { data: allOrders } = await supabase.from('orders').select('*, users(full_name)');
    showAdminOrders(allOrders);
  };

  async function showAdminCurrencies() {
    const { data } = await supabase.from('platform_settings').select('*').eq('type', 'currency');
    const container = document.getElementById('adminContent');
    container.innerHTML = `<h3>Editar Tasas</h3>${data.map(c => `<div style="display:flex; gap:10px; margin-bottom:10px;"><strong>${c.key}</strong><input id="rate-${c.key}" value="${c.rate_value}" style="width:120px"><input id="comm-${c.key}" value="${c.commission_value}" style="width:80px"><input id="acc-${c.key}" value="${c.receiving_account || ''}" style="width:180px"><button class="btn-outline" onclick="updateCurrency('${c.key}')">Guardar</button></div>`).join('')}<button id="refreshCurr" class="btn-neon">Refrescar</button>`;
    document.getElementById('refreshCurr')?.addEventListener('click', () => { loadCurrencies(); showAdminCurrencies(); });
  }

  window.updateCurrency = async (key) => {
    const rate = parseFloat(document.getElementById(`rate-${key}`).value);
    const comm = parseFloat(document.getElementById(`comm-${key}`).value);
    const acc = document.getElementById(`acc-${key}`).value;
    await supabase.from('platform_settings').update({ rate_value: rate, commission_value: comm, receiving_account: acc }).eq('key', key).eq('type', 'currency');
    showToast(`${key} actualizado`);
    await loadCurrencies();
    showAdminCurrencies();
  };

  window.uploadProof = async (orderId) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (file) {
        const fakeUrl = URL.createObjectURL(file);
        await supabase.from('orders').update({ payment_proof_url: fakeUrl }).eq('id', orderId);
        showToast('Comprobante subido');
        renderView('dashboard');
      }
    };
    input.click();
  };

  function updateNavButtons() {
    const logged = !!currentUser;
    document.querySelectorAll('[data-view="register"], [data-view="login"]').forEach(btn => btn.style.display = logged ? 'none' : 'inline-block');
    document.getElementById('dashboardNavBtn').style.display = logged ? 'inline-block' : 'none';
    document.getElementById('adminNavBtn').style.display = (logged && (currentUser?.role === 'admin' || currentUser?.role === 'founder')) ? 'inline-block' : 'none';
    document.getElementById('logoutBtn').style.display = logged ? 'inline-block' : 'none';
  }

  function logout() {
    sessionStorage.removeItem('starpage_user');
    currentUser = null;
    updateNavButtons();
    renderView('landing');
    showToast('Sesión cerrada');
  }

  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-view]');
    if (target) {
      e.preventDefault();
      if (target.getAttribute('data-view') === 'logout') logout();
      else renderView(target.getAttribute('data-view'));
    }
    if (e.target.id === 'logoutBtn') logout();
  });

  async function init() {
    await loadCurrencies();
    const stored = sessionStorage.getItem('starpage_user');
    if (stored) {
      currentUser = JSON.parse(stored);
      updateNavButtons();
      renderView('dashboard');
    } else {
      renderView('landing');
    }
  }
  init();
</script>
</body>
</html>
