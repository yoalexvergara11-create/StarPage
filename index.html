<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StarPage</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;text-align:center}
input,button{padding:10px;margin:5px;border-radius:10px}
button{background:#00f0ff;color:#000;font-weight:bold}
</style>
</head>

<body>

<h1>🚀 StarPage</h1>

<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">
  <h2>Calculadora</h2>
  <input id="usd" placeholder="USD">
  <p id="result">0 Bs</p>

  <h3>Crear Orden</h3>
  <input id="amount" placeholder="Monto USD">
  <button onclick="crearOrden()">Crear</button>

  <h3>Mis órdenes</h3>
  <div id="orders"></div>

  <button onclick="logout()">Salir</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://drdlldpcyeaavjdqrzec.supabase.co",
  "sb_publishable_38DviMPudTo2uM1QdzCh5g_7B1cyEmx"
);

// LOGIN
async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if(error){
    alert("Error login");
    return;
  }

  document.getElementById('auth').style.display="none";
  document.getElementById('app').style.display="block";

  cargarDatos();
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// CALCULO AUTOMATICO
document.getElementById('usd').addEventListener('input', async ()=>{
  const usd = parseFloat(document.getElementById('usd').value)||0;

  const { data } = await supabase.from('settings').select('*').single();

  const result = usd * data.rate * (1 - data.commission/100);

  document.getElementById('result').innerText = result.toLocaleString() + " Bs";
});

// CREAR ORDEN
async function crearOrden(){
  const user = (await supabase.auth.getUser()).data.user;
  const amount = parseFloat(document.getElementById('amount').value);

  const { data:settings } = await supabase.from('settings').select('*').single();

  const net = amount * settings.rate * (1 - settings.commission/100);

  await supabase.from('orders').insert({
    user_id: user.id,
    amount_usd: amount,
    net_bs: net
  });

  alert("Orden creada");
  cargarDatos();
}

// CARGAR ORDENES
async function cargarDatos(){
  const user = (await supabase.auth.getUser()).data.user;

  const { data } = await supabase
    .from('orders')
    .select('*')
    .eq('user_id', user.id);

  document.getElementById('orders').innerHTML =
    data.map(o=>`<p>$${o.amount_usd} → ${o.net_bs}</p>`).join('');
}
</script>

</body>
</html>
