<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: #0b0b10;
            color: white;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 40px;
            margin: 0;
        }

        .container {
            background: #111;
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(192, 132, 252, 0.1);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #9333ea;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
            font-size: 14px;
            color: #888;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div id="app-content" class="hidden">
        <div class="container">
            <h2>Mi Perfil</h2>
            
            <img id="preview" src="https://via.placeholder.com/120" class="avatar">
            
            <br>
            <label style="display: block; margin-bottom: 10px; color: #c084fc;">Cambiar foto de perfil:</label>
            <input type="file" accept="image/*" onchange="load(event)">
            
            <p id="user-email" style="color: #888; font-size: 14px;"></p>
            
            <button onclick="logout()" style="background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 20px;">
                Cerrar Sesión
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Tus credenciales reales de StarPage
        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // EL GUARDIÁN: Verifica la identidad del usuario
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario autenticado: Mostrar contenido y su correo
                document.getElementById("app-content").classList.remove("hidden");
                document.getElementById("user-email").innerText = "Conectado como: " + user.email;
            } else {
                // No hay usuario: Expulsar al index.html
                window.location.href = "index.html"; 
            }
        });

        // Función para cargar la imagen localmente
        window.load = function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById("preview").src = URL.createObjectURL(file);
            }
        }

        // Función para cerrar sesión
        window.logout = function() {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        }
    </script>

</body>
</html>
