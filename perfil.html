<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil</title>

<style>
body{
    background:#0b0b10;
    color:white;
    font-family:Arial;
    text-align:center;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>Mi Perfil</h2>

<img id="preview" src="https://via.placeholder.com/100" class="avatar">

<br><br>

<input type="file" onchange="load(event)">

<script>
function load(e){
    document.getElementById("preview").src = URL.createObjectURL(e.target.files[0]);
}
</script>

</body>
</html>
