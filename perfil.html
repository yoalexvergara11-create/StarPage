<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | StarPage</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="padding: 20px;">
    <div style="max-width: 900px; margin: 0 auto;">
        <!-- Header Perfil -->
        <div class="glass-panel" style="display:flex; align-items: center; padding: 30px; margin-bottom: 20px;">
            <div style="width: 80px; height: 80px; background: var(--secondary); border-radius: 50%; display:flex; align-items: center; justify-content: center; font-size: 2rem;">
                <i class="fa-solid fa-user"></i>
            </div>
            <div style="margin-left: 20px;">
                <h2 id="user-email" style="margin:0;">Cargando...</h2>
                <span id="user-status" style="font-size: 0.8rem; color: var(--primary);">Miembro Verificado</span>
            </div>
            <div style="margin-left: auto;">
                <button class="btn-premium" onclick="window.location.href='vender.html'">NUEVA OPERACIÓN</button>
            </div>
        </div>

        <!-- Historial -->
        <div class="glass-panel" style="padding: 30px;">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> MI ACTIVIDAD RECIENTE</h3>
            <div id="user-orders" style="margin-top: 20px;">
                <p style="opacity: 0.5;">No hay operaciones registradas todavía.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* TUS DATOS */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-email').innerText = user.email;
                
                // Cargar Órdenes del Usuario
                const q = query(collection(db, "orders"), where("userId", "==", user.uid));
                onSnapshot(q, (snap) => {
                    const container = document.getElementById('user-orders');
                    container.innerHTML = "";
                    
                    snap.forEach(doc => {
                        const o = doc.data();
                        container.innerHTML += `
                            <div class="glass-panel" style="background: rgba(255,255,255,0.03); margin-bottom: 10px; display:flex; justify-content: space-between; align-items: center; padding: 15px 25px;">
                                <div>
                                    <div style="font-size: 0.9rem; font-weight: bold;">Venta de $${o.amountUSD} USD</div>
                                    <div style="font-size: 0.7rem; opacity: 0.6;">${o.createdAt?.toDate().toLocaleString() || 'Reciente'}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="color: var(--gold); font-weight: bold;">+ ${o.amountVES.toLocaleString()} Bs</div>
                                    <div style="font-size: 0.7rem; color: ${o.status === 'pending' ? '#ffcc00' : '#00ff88'}">${o.status.toUpperCase()}</div>
                                </div>
                            </div>
                        `;
                    });
                });
            }
        });
    </script>
</body>
</html>
