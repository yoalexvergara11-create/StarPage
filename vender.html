<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vender Saldo | StarPage</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <h2>Vender Saldo (USD a VES)</h2>
        <div id="rate-loader">Cargando tasa del día...</div>
        
        <div class="input-group">
            <label>Monto a Vender (USD - Zelle/Paypal)</label>
            <input type="number" id="usd-amount" placeholder="100" oninput="window.calculate()">
        </div>
        <div class="input-group">
            <label>Monto a Recibir (VES)</label>
            <input type="number" id="ves-amount" disabled>
        </div>

        <hr>
        <h4>Datos para recibir el Pago Móvil</h4>
        <div class="input-group">
             <input type="tel" id="pm-phone" placeholder="Teléfono del destinatario">
        </div>
        <div class="input-group">
             <input type="text" id="pm-dni" placeholder="Cédula del destinatario">
        </div>
        
        <button class="btn-grad" onclick="window.submitOrder()">Confirmar Operación</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { /* Tu config */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let clientSellRate = 0;
        let currentUser = null;

        // Cargar tasa y verificar auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const settingsDoc = await getDoc(doc(db, "settings", "rates"));
                if (settingsDoc.exists()) {
                    clientSellRate = settingsDoc.data().sellRate;
                    document.getElementById('rate-loader').textContent = `Tasa de hoy: ${clientSellRate} VES por USD.`;
                } else {
                    document.getElementById('rate-loader').textContent = "Error: El administrador no ha definido una tasa.";
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // Calcular en tiempo real
        window.calculate = () => {
            const usd = parseFloat(document.getElementById('usd-amount').value);
            if (usd > 0 && clientSellRate > 0) {
                document.getElementById('ves-amount').value = (usd * clientSellRate).toFixed(2);
            }
        };

        // Enviar pedido a la base de datos
        window.submitOrder = async () => {
            const amountSent = parseFloat(document.getElementById('usd-amount').value);
            const amountToReceive = parseFloat(document.getElementById('ves-amount').value);
            const recipientPhone = document.getElementById('pm-phone').value;
            const recipientDNI = document.getElementById('pm-dni').value;

            if (!amountSent || !recipientPhone || !recipientDNI) {
                return alert("Completa todos los campos para continuar.");
            }

            // Aquí está la magia: calculas tu ganancia para guardarla
            const marketRateResponse = await fetch('https://v6.exchangerate-api.com/v6/TU_API_KEY/latest/USD');
            const marketData = await marketRateResponse.json();
            const realMarketRate = marketData.conversion_rates.VES;
            const commissionEarned = (amountSent * realMarketRate) - amountToReceive;

            if(confirm(`Confirmas que quieres vender ${amountSent} USD para recibir ${amountToReceive} VES?`)){
                try {
                    await addDoc(collection(db, "orders"), {
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        type: "sell", // Venta de USD
                        amountSent: amountSent,
                        currencySent: "USD",
                        amountToReceive: amountToReceive,
                        recipientInfo: { phone: recipientPhone, dni: recipientDNI },
                        exchangeRateUsed: clientSellRate,
                        marketRate: realMarketRate,
                        commissionEarned: commissionEarned,
                        status: "pending", // El admin debe procesarlo
                        createdAt: serverTimestamp()
                    });
                    alert("¡Pedido recibido! Serás notificado cuando se procese.");
                    window.location.href = 'perfil.html'; // O a una página de historial
                } catch (e) {
                    alert("Error al enviar el pedido: " + e.message);
                }
            }
        };
    </script>
</body>
</html>
