<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Vender Divisas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0b0b10; color: white; display: flex; justify-content: center; padding: 20px; }
        .trade-container { width: 100%; max-width: 450px; background: #1a1a24; padding: 30px; border-radius: 24px; border: 1px solid #2e2e3a; }
        .input-box { background: #0b0b10; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2e2e3a; }
        .input-box label { color: #888; font-size: 12px; display: block; margin-bottom: 8px; }
        .input-box input { background: transparent; border: none; color: white; font-size: 20px; font-weight: 600; width: 100%; outline: none; }
        .bank-preview { background: rgba(147, 51, 234, 0.1); border: 1px solid #9333ea; padding: 15px; border-radius: 14px; margin: 15px 0; font-size: 13px; }
        .upload-area { border: 2px dashed #444; padding: 20px; text-align: center; border-radius: 16px; margin: 20px 0; cursor: pointer; }
        .btn-trade { width: 100%; padding: 18px; background: linear-gradient(135deg, #9333ea, #4ade80); border: none; border-radius: 14px; color: white; font-weight: 700; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="trade-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <span style="font-weight:bold; color:#4ade80">STARPAGE EXCHANGE</span>
            <a href="lobby.html" style="color:#888; text-decoration:none; font-size:12px">Volver</a>
        </div>

        <div class="input-box">
            <label>Tú envías (USD)</label>
            <input type="number" id="send-amount" placeholder="0.00" oninput="calculate()">
        </div>

        <div class="input-box">
            <label>Recibes en Bolívares (VES)</label>
            <input type="number" id="receive-amount" readonly placeholder="0.00">
        </div>

        <div id="bank-info" class="bank-preview hidden">
            <span style="color:#c084fc; font-weight:bold">Depósito en:</span>
            <p id="bank-text" style="margin:5px 0 0;"></p>
        </div>

        <div class="upload-area" onclick="document.getElementById('receipt').click()">
            <i class="fa-solid fa-camera"></i>
            <p id="file-status">Subir comprobante de pago</p>
            <input type="file" id="receipt" class="hidden" accept="image/*" onchange="document.getElementById('file-status').innerText=this.files[0].name">
        </div>

        <button class="btn-trade" id="btn-submit" onclick="enviarPedido()">Confirmar Venta</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let myBank = null;
        const TASA = 45.00; // Ajusta esto según el día

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "bank_accounts", user.uid));
                if (docSnap.exists()) {
                    myBank = docSnap.data();
                    document.getElementById('bank-info').classList.remove('hidden');
                    document.getElementById('bank-text').innerText = `${myBank.banco} - ${myBank.telefono}`;
                } else {
                    alert("Por favor, configura tu Pago Móvil en el Lobby antes de vender.");
                    window.location.href = 'lobby.html';
                }
            }
        });

        window.calculate = () => {
            const val = document.getElementById('send-amount').value;
            document.getElementById('receive-amount').value = (val * TASA).toFixed(2);
        };

        window.enviarPedido = async () => {
            const user = auth.currentUser;
            const file = document.getElementById('receipt').files[0];
            const amountIn = document.getElementById('send-amount').value;

            if(!file || !amountIn) return alert("Monto y comprobante obligatorios");

            document.getElementById('btn-submit').innerText = "Procesando...";
            
            try {
                const sRef = ref(storage, `pedidos/${Date.now()}_${user.uid}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);

                await addDoc(collection(db, "pedidos"), {
                    userEmail: user.email,
                    montoIn: amountIn,
                    montoOut: (amountIn * TASA),
                    bancoDestino: myBank.banco,
                    pagoMovil: myBank.telefono,
                    comprobanteURL: url,
                    status: "pending",
                    date: new Date()
                });

                alert("¡Pedido enviado! Revisa tu cuenta en unos minutos.");
                window.location.href = 'lobby.html';
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
