<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPage | Vender USDT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0b10; color: white; font-family: 'Inter', sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #111; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(74, 222, 128, 0.1); width: 320px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #2e2e3a; background: #1e1e2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(90deg, #4ade80, #22c55e); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        h3 { color: #4ade80; text-align: center; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>

<body>

    <div id="app-content" class="hidden">
        <div class="card">
            <h2>Vender USDT</h2>
            <p style="font-size: 14px; color: #888;">Tasa actual: 670 Bs/USDT</p>
            
            <input type="number" id="usdt" placeholder="Cantidad de USDT">
            <button onclick="calc()">Calcular Cambio</button>

            <h3 id="res"></h3>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCH9EghFUhATPScF0KFPP78RhhOaRXw7w4",
            authDomain: "starpage-aad7e.firebaseapp.com",
            projectId: "starpage-aad7e",
            storageBucket: "starpage-aad7e.firebasestorage.app",
            messagingSenderId: "68878211023",
            appId: "1:68878211023:web:81015ce98366639003e4ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // EL GUARDIÁN: Verifica si el usuario es real
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Si hay usuario, mostramos la página
                document.getElementById("app-content").classList.remove("hidden");
            } else {
                // Si no hay usuario, lo mandamos al login inmediatamente
                window.location.href = "index.html"; 
            }
        });

        // Función de cálculo
        window.calc = function() {
            let usdt = document.getElementById("usdt").value;
            let tasa = 670; // Esta tasa luego la traeremos de tu Panel de Admin
            if(usdt > 0) {
                let resultado = usdt * tasa;
                document.getElementById("res").innerText = "Recibirás: " + resultado.toLocaleString('es-VE') + " Bs";
            } else {
                alert("Ingresa una cantidad válida");
            }
        }
    </script>

</body>
</html>
