<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vender Saldo | StarPage Pro</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="padding: 20px;">
    <div style="max-width: 600px; margin: 40px auto;">
        <div class="glass-panel" style="padding: 40px; border: 1px solid var(--primary);">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="margin:0; color:var(--primary);"><i class="fa-solid fa-money-bill-transfer"></i> VENDER USD</h2>
                <span id="live-rate" style="font-size: 0.8rem; background: rgba(0,242,255,0.1); padding: 5px 12px; border-radius: 20px; color: var(--primary);">Cargando tasa...</span>
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom: 10px; opacity: 0.8;">Monto a enviar (USD)</label>
                <div style="position:relative;">
                    <span style="position:absolute; left: 15px; top: 15px; color:var(--primary); font-weight: bold;">$</span>
                    <input type="number" id="usd-input" class="modern-input" style="padding-left: 35px;" placeholder="0.00" oninput="calculate()">
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 30px;">
                <label style="display:block; margin-bottom: 10px; opacity: 0.8;">Recibirás en Pago Móvil (VES)</label>
                <div style="position:relative;">
                    <span style="position:absolute; left: 15px; top: 15px; color:var(--gold); font-weight: bold;">Bs</span>
                    <input type="text" id="ves-output" class="modern-input" style="padding-left: 45px; background: rgba(255,255,255,0.02);" readonly placeholder="0.00">
                </div>
                <p style="font-size: 0.75rem; margin-top: 10px; color: var(--primary);">* Tasa garantizada por 15 minutos.</p>
            </div>

            <div class="glass-panel" style="padding: 20px; margin-bottom: 30px; background: rgba(0,0,0,0.3);">
                <h4 style="margin-top:0; font-size: 0.9rem;"><i class="fa-solid fa-university"></i> DATOS DE RECEPCIÓN</h4>
                <input type="text" id="pm-phone" class="modern-input" placeholder="Teléfono Pago Móvil" style="margin-bottom: 10px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" id="pm-dni" class="modern-input" placeholder="Cédula/RIF">
                    <select id="pm-bank" class="modern-input">
                        <option value="0102">Banesco</option>
                        <option value="0105">Mercantil</option>
                        <option value="0108">Provincial</option>
                        <option value="0134">Banesco</option>
                    </select>
                </div>
            </div>

            <button class="btn-premium" style="width: 100%;" onclick="submitOrder()">INICIAR TRANSFERENCIA</button>
            <button class="btn-premium" style="width: 100%; background: none; margin-top: 10px; border: 1px solid var(--border);" onclick="window.location.href='lobby.html'">VOLVER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* TUS DATOS */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentRate = 0;
        let userData = null;

        // Escuchar Tasa en Tiempo Real
        onSnapshot(doc(db, "settings", "rates"), (doc) => {
            if(doc.exists()) {
                currentRate = doc.data().sellRate;
                document.getElementById('live-rate').innerText = `Tasa: ${currentRate} VES`;
                calculate();
            }
        });

        window.calculate = () => {
            const usd = parseFloat(document.getElementById('usd-input').value) || 0;
            document.getElementById('ves-output').value = (usd * currentRate).toLocaleString('es-VE', {minimumFractionDigits: 2});
        };

        window.submitOrder = async () => {
            const usd = parseFloat(document.getElementById('usd-input').value);
            const phone = document.getElementById('pm-phone').value;
            const dni = document.getElementById('pm-dni').value;
            
            if(!usd || usd < 5) return Swal.fire('Monto Inválido', 'El mínimo es $5 USD', 'warning');
            if(!phone || !dni) return Swal.fire('Faltan Datos', 'Completa los datos del pago móvil', 'warning');

            Swal.fire({
                title: '¿Confirmar Pedido?',
                text: `Vas a vender $${usd} USD. Recibirás el pago en unos minutos.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'SÍ, CONFIRMAR'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    // CÁLCULO DE GANANCIA PARA EL ADMIN (Spread de $4 aprox por cada $100)
                    // Simulamos tasa real de mercado sumando un margen
                    const realMarketRate = currentRate + 2.5; 
                    const commissionUSD = (usd * realMarketRate - usd * currentRate) / realMarketRate;

                    await addDoc(collection(db, "orders"), {
                        userId: auth.currentUser.uid,
                        userEmail: auth.currentUser.email,
                        amountUSD: usd,
                        amountVES: usd * currentRate,
                        exchangeRateUsed: currentRate,
                        commissionUSD: commissionUSD,
                        recipient: { phone, dni, bank: document.getElementById('pm-bank').value },
                        status: "pending",
                        type: "vender",
                        createdAt: serverTimestamp()
                    });

                    Swal.fire('¡Éxito!', 'Tu pedido ha sido enviado. En breve verás el pago móvil.', 'success')
                    .then(() => window.location.href = 'perfil.html');
                }
            });
        };
    </script>
</body>
</html>
