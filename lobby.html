<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificando... | StarPage</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center;">
        <div class="glass-panel" style="padding: 50px; max-width: 500px;">
            <div class="loading-pulse">
                <h1 style="color: var(--primary); font-size: 3rem; margin:0;">ST<span style="color:white;">P</span></h1>
            </div>
            <h2 id="status-title" style="margin-top: 30px;">Verificando Identidad</h2>
            <p id="status-desc" style="opacity: 0.7; line-height: 1.6;">Estamos validando tu cuenta con el sistema central. Esto suele tardar unos segundos.</p>
            <div id="loader-bar" style="width: 100%; height: 2px; background: var(--border); margin: 30px 0; position:relative; overflow:hidden;">
                <div style="width: 50%; height: 100%; background: var(--primary); position:absolute; animation: slide 2s infinite;"></div>
            </div>
            <button class="btn-premium" onclick="window.location.href='index.html'" style="background: none; border: 1px solid var(--border);">CERRAR SESIÓN</button>
        </div>
    </div>

    <style>
        @keyframes slide { from { left: -50%; } to { left: 100%; } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* TUS DATOS */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Escucha en tiempo real si el admin lo aprueba
                onSnapshot(doc(db, "users", user.uid), (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        if (data.status === "approved") {
                            window.location.href = "vender.html";
                        } else if (data.status === "rejected") {
                            document.getElementById('status-title').innerText = "Acceso Denegado";
                            document.getElementById('status-desc').innerText = "Tu cuenta no cumple con los requisitos de seguridad.";
                        }
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
